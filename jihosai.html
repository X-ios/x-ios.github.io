<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双败淘汰赛 · Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-deep: #080b14;
            --bg-card: rgba(18, 24, 42, 0.85);
            --bg-card-hover: rgba(26, 34, 58, 0.92);
            --border-subtle: rgba(148, 163, 184, 0.12);
            --border-hover: rgba(148, 163, 184, 0.28);
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-gold: #fbbf24;
            --accent-cyan: #38bdf8;
            --accent-red: #f87171;
            --accent-green: #34d399;
            --accent-purple: #a78bfa;
            --col-w: 280px;
            --row-h: 90px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-particles {
            position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
        }
        .bg-particles::before {
            content: ''; position: absolute; inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 80%, rgba(56, 189, 248, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 20%, rgba(167, 139, 250, 0.05) 0%, transparent 60%),
                radial-gradient(circle at 50% 50%, rgba(251, 191, 36, 0.03) 0%, transparent 50%);
        }
        .bg-particles::after {
            content: ''; position: absolute; inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 50% 50%, rgba(56,189,248,0.05) 0%, transparent 60%),
                radial-gradient(ellipse 50% 60% at 30% 70%, rgba(244,114,182,0.05) 0%, transparent 50%);
            animation: bgPulse 15s ease-in-out infinite alternate;
            pointer-events: none;
        }
        @keyframes bgPulse {
            0% { opacity: 0.6; transform: scale(1) rotate(0deg); }
            100% { opacity: 1; transform: scale(1.15) rotate(3deg); }
        }
        .particle {
            position: absolute; width: 3px; height: 3px;
            background: rgba(255,255,255,0.25); border-radius: 50%;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; transform: translateY(90vh) scale(1); }
            90% { opacity: 0.6; }
            100% { transform: translateY(-20px) scale(0.5); opacity: 0; }
        }

        .glow-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0;
            animation: blobBreathe 18s infinite ease-in-out;
            pointer-events: none;
        }
        @keyframes blobBreathe {
            0%, 100% { opacity: 0.2; transform: translate(0, 0) scale(1); }
            33% { opacity: 0.45; transform: translate(40px, -30px) scale(1.15); }
            66% { opacity: 0.35; transform: translate(-20px, 20px) scale(0.9); }
        }

        .aurora {
            position: absolute;
            width: 300%;
            height: 80px;
            background: linear-gradient(90deg, transparent, rgba(56,189,248,0.12), rgba(167,139,250,0.12), rgba(251,191,36,0.08), transparent);
            filter: blur(25px);
            animation: auroraSlide 20s linear infinite;
            pointer-events: none;
            opacity: 0.6;
        }
        @keyframes auroraSlide {
            0% { transform: translateX(-60%) skewX(-5deg); }
            100% { transform: translateX(0%) skewX(-5deg); }
        }

        .app { display: flex; flex-direction: column; min-height: 100vh; position: relative; z-index: 1; }

        .sidebar {
            width: 100%; flex-shrink: 0;
            background: rgba(8, 11, 20, 0.6);
            backdrop-filter: blur(30px);
            border-bottom: 1px solid var(--border-subtle);
            padding: 10px 20px;
            display: flex; flex-direction: row; align-items: center; gap: 16px;
            overflow-x: auto;
        }
        .sidebar::-webkit-scrollbar { display: none; }
        .sidebar { -ms-overflow-style: none; scrollbar-width: none; }
        .sidebar-brand {
            display: flex; align-items: center; gap: 12px;
            flex-shrink: 0;
        }
        .sidebar-brand i { font-size: 22px; color: var(--accent-gold); }
        .sidebar-brand span {
            font-size: 17px; font-weight: 800;
            background: linear-gradient(135deg, #fbbf24, #f472b6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .section-title { display: none; }
        .tournament-list {
            display: flex; flex-direction: row; align-items: center; gap: 6px;
            padding: 0; margin-bottom: 0; flex: 1; min-width: 0; overflow-x: auto;
        }
        .tournament-list::-webkit-scrollbar { display: none; }
        .tournament-list { -ms-overflow-style: none; scrollbar-width: none; }
        .tournament-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 7px 14px; margin-bottom: 0;
            border-radius: 12px; cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
            font-size: 13px; font-weight: 500;
            color: var(--text-secondary);
            white-space: nowrap;
        }
        .tournament-item:hover { background: rgba(255,255,255,0.04); color: var(--text-primary); }
        .tournament-item.active {
            background: linear-gradient(135deg, rgba(99,102,241,0.25), rgba(139,92,246,0.2));
            border-color: rgba(139,92,246,0.3);
            color: white; font-weight: 600;
        }
        .tournament-item .del-btn {
            opacity: 0; width: 20px; height: 20px; border-radius: 5px;
            border: none; background: transparent; color: var(--text-muted);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; font-size: 10px; margin-left: 8px;
        }
        .tournament-item:hover .del-btn { opacity: 1; }
        .tournament-item .del-btn:hover { background: rgba(239,68,68,0.15); color: #ef4444; }
        .add-tournament-btn {
            margin: 0; padding: 7px 12px;
            background: rgba(255,255,255,0.05);
            border: 1px dashed var(--border-subtle);
            border-radius: 10px; color: var(--text-muted);
            font-size: 12px; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; gap: 6px;
            flex-shrink: 0;
        }
        .add-tournament-btn:hover {
            border-color: var(--accent-gold); color: var(--accent-gold);
            background: rgba(251,191,36,0.05);
        }

        .main { flex: 1; min-width: 0; padding: 16px 24px; }
        .page-header {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 16px;
        }
        .page-title h1 {
            font-size: 24px; font-weight: 800;
            background: linear-gradient(135deg, #fbbf24, #f472b6, #a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }
        .page-title p { color: var(--text-muted); font-size: 13px; }

        .top-bar {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(8, 11, 20, 0.55);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px; padding: 8px 14px;
            margin-bottom: 16px;
            gap: 12px; flex-wrap: wrap;
            box-shadow: 0 4px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.04);
        }
        .tab-group {
            display: flex; gap: 4px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px; padding: 3px;
        }
        .tab-btn {
            padding: 7px 16px; border-radius: 10px;
            border: none; background: transparent;
            color: var(--text-muted); font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; gap: 6px;
        }
        .tab-btn:hover { color: var(--text-primary); }
        .tab-btn.active {
            background: linear-gradient(135deg, rgba(99,102,241,0.3), rgba(139,92,246,0.25));
            color: white; box-shadow: 0 2px 8px rgba(99,102,241,0.2);
        }
        .zoom-group {
            display: flex; align-items: center; gap: 6px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px; padding: 3px 10px;
        }
        .zoom-btn {
            width: 26px; height: 26px; border-radius: 8px;
            border: none; background: rgba(255,255,255,0.06);
            color: var(--text-muted); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; font-size: 11px;
        }
        .zoom-btn:hover { background: rgba(255,255,255,0.12); color: white; }
        .zoom-val { min-width: 40px; text-align: center; font-size: 12px; font-weight: 700; color: var(--text-primary); }
        .action-group { display: flex; gap: 8px; }
        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 7px 14px; border-radius: 10px;
            font-size: 12px; font-weight: 600; cursor: pointer;
            border: 1px solid transparent; transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white; box-shadow: 0 2px 10px rgba(99,102,241,0.25);
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(99,102,241,0.35); }
        .btn-ghost {
            background: rgba(255,255,255,0.05);
            border-color: var(--border-subtle);
            color: var(--text-secondary);
        }
        .btn-ghost:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--border-hover);
            color: var(--text-primary);
        }

        .bracket-viewport {
            overflow: auto; border-radius: 20px;
            background: rgba(0,0,0,0.12);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 20px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), 0 8px 32px rgba(0,0,0,0.2);
        }
        .bracket-canvas {
            position: relative;
            transform-origin: top left;
            transition: transform 0.15s ease;
            min-width: fit-content;
        }

        .grid-header {
            display: flex;
            margin-bottom: 12px;
            padding-left: 10px;
        }
        .col-header {
            width: var(--col-w);
            flex-shrink: 0;
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            color: var(--accent-gold);
            letter-spacing: 0.08em;
            padding: 6px 0;
            border-bottom: 1px solid rgba(251,191,36,0.12);
        }

        .grid-body {
            position: relative;
        }

        .svg-layer {
            position: absolute; top: 0; left: 0;
            pointer-events: none; z-index: 0;
        }
        .svg-layer path {
            fill: none; stroke-width: 2.5;
            stroke-linecap: round; stroke-linejoin: round;
            opacity: 0.5;
            transition: opacity 0.3s, stroke-width 0.3s;
        }
        .svg-layer path:hover { opacity: 0.85; stroke-width: 3.5; }
        .svg-layer .win-path { stroke: url(#gradWin); }
        .svg-layer .lose-path { stroke: url(#gradLose); }

        .match-card {
            position: absolute;
            width: 250px;
            background: linear-gradient(160deg, rgba(22,30,52,0.88) 0%, rgba(14,20,38,0.92) 100%);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            overflow: visible;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
            z-index: 1;
        }
        .match-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
            opacity: 0.7; transition: opacity 0.3s;
        }
        .match-card.type-winners::before,
        .match-card.type-胜者组::before,
        .match-card.type-晋级赛::before,
        .match-card.type-小组赛::before {
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
        }
        .match-card.type-losers::before,
        .match-card.type-败者组::before {
            background: linear-gradient(90deg, transparent, var(--accent-red), transparent);
        }
        .match-card.type-final::before,
        .match-card.type-总决赛::before,
        .match-card.type-决赛::before,
        .match-card.type-半决赛::before {
            background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
        }
        .match-card:hover {
            transform: translateY(-2px) scale(1.02);
            background: linear-gradient(160deg, rgba(30,40,68,0.95) 0%, rgba(20,28,50,0.98) 100%);
            border-color: var(--border-hover);
            box-shadow: 0 10px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
            z-index: 10;
        }
        .match-card:hover::before { opacity: 1; }

        /* 总决赛特殊光晕 */
        .match-card.is-final {
            border-color: rgba(251,191,36,0.3);
            box-shadow: 0 0 30px rgba(251,191,36,0.08), 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .match-card.is-final:hover {
            border-color: rgba(251,191,36,0.5);
            box-shadow: 0 0 40px rgba(251,191,36,0.15), 0 10px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
        }

        /* 皇冠图标 */
        .finals-crown {
            position: absolute;
            top: -16px;
            left: 50%;
            transform: translateX(-50%);
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #fff;
            box-shadow: 0 0 24px rgba(251,191,36,0.6), 0 4px 12px rgba(0,0,0,0.4);
            z-index: 5;
            border: 2px solid rgba(255,255,255,0.3);
            pointer-events: none;
            animation: crownFloat 3s ease-in-out infinite;
        }
        @keyframes crownFloat {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-4px); }
        }

        .match-card-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 7px 10px 5px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .match-meta { display: flex; align-items: center; gap: 6px; }
        .match-id-tag {
            font-family: 'Inter', monospace; font-size: 10px; font-weight: 800;
            padding: 1px 6px; border-radius: 10px;
        }
        .match-id-tag.w-tag { color: var(--accent-cyan); background: rgba(56,189,248,0.1); }
        .match-id-tag.l-tag { color: var(--accent-red); background: rgba(248,113,113,0.1); }
        .match-id-tag.f-tag { color: var(--accent-gold); background: rgba(251,191,36,0.1); }
        .match-round-tag { font-size: 10px; font-weight: 500; color: var(--text-muted); }
        .match-status {
            font-size: 9px; font-weight: 700; letter-spacing: 0.03em;
            padding: 2px 6px; border-radius: 10px;
        }
        .match-status.done {
            background: rgba(52,211,153,0.12); color: var(--accent-green);
            border: 1px solid rgba(52,211,153,0.18);
        }
        .match-status.wait {
            background: rgba(148,163,184,0.08); color: var(--text-muted);
            border: 1px solid rgba(148,163,184,0.12);
        }
        .match-status.unk {
            background: rgba(100,116,139,0.08); color: var(--text-muted);
            border: 1px solid rgba(100,116,139,0.1);
        }

        .match-body {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 10px;
            gap: 8px;
        }
        .team-side {
            display: flex; align-items: center; gap: 7px;
            flex: 1; min-width: 0;
        }
        .team-side.right { justify-content: flex-end; }
        .team-avatar {
            width: 26px; height: 26px; border-radius: 8px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 700;
            background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(168,85,247,0.15));
            border: 1px solid rgba(255,255,255,0.08);
            color: #c7d2fe;
        }
        .team-avatar.winner {
            background: linear-gradient(135deg, rgba(52,211,153,0.25), rgba(45,212,191,0.2));
            border-color: rgba(52,211,153,0.3);
            color: #6ee7b7;
            box-shadow: 0 0 10px rgba(52,211,153,0.12);
        }
        .team-avatar.loser {
            background: rgba(100,116,139,0.1);
            border-color: rgba(100,116,139,0.15);
            color: var(--text-muted);
        }
        .team-name {
            font-size: 13px; font-weight: 600;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .team-name.win { color: var(--accent-green); text-shadow: 0 0 8px rgba(52,211,153,0.15); }
        .team-name.lose { color: var(--text-muted); text-decoration: line-through; text-decoration-color: rgba(248,113,113,0.35); text-decoration-thickness: 1.5px; }
        .team-name.pending { color: var(--text-secondary); }

        .score-center {
            font-family: 'Inter', monospace; font-weight: 800; font-size: 15px;
            min-width: 42px; text-align: center; letter-spacing: 0.05em;
            flex-shrink: 0;
        }
        .score-center.vs { color: var(--text-muted); font-size: 12px; font-weight: 600; }
        .score-center.done {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .match-footer {
            display: flex; justify-content: space-between; align-items: center;
            padding: 5px 10px 8px;
            border-top: 1px solid rgba(255,255,255,0.02);
        }
        .match-time {
            font-size: 10px; color: var(--text-muted);
            display: flex; align-items: center; gap: 4px;
        }
        .match-links {
            display: flex; gap: 8px; font-size: 10px;
        }
        .match-link {
            display: flex; align-items: center; gap: 2px;
        }
        .match-link.win-link { color: rgba(56,189,248,0.5); }
        .match-link.lose-link { color: rgba(248,113,113,0.5); }

        .admin-table-wrap {
            overflow-x: auto; border-radius: 16px;
            background: rgba(0,0,0,0.1);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        table { width: 100%; min-width: 1100px; border-collapse: collapse; }
        th {
            background: rgba(255,255,255,0.03);
            font-size: 11px; font-weight: 700; letter-spacing: 0.05em;
            color: var(--text-muted); text-transform: uppercase;
            padding: 12px 10px; text-align: left;
            border-bottom: 1px solid var(--border-subtle);
        }
        td {
            padding: 10px; font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            color: var(--text-secondary);
        }
        tr:hover td { background: rgba(255,255,255,0.02); }
        .admin-input {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border-subtle);
            border-radius: 8px; padding: 6px 10px;
            color: var(--text-primary); font-size: 13px;
            width: 100%; outline: none; transition: all 0.2s;
        }
        .admin-input:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(56,189,248,0.1);
        }
        .admin-input[type="number"] { width: 70px; }
        .del-row-btn {
            width: 28px; height: 28px; border-radius: 8px;
            border: none; background: transparent;
            color: var(--text-muted); cursor: pointer;
            transition: all 0.2s;
        }
        .del-row-btn:hover { background: rgba(239,68,68,0.12); color: #ef4444; }
        .status-pill {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(251,191,36,0.1);
            border: 1px solid rgba(251,191,36,0.25);
            color: var(--accent-gold);
            padding: 6px 14px; border-radius: 12px;
            font-size: 12px; font-weight: 600;
        }

        .modal-overlay {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            display: none; align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: linear-gradient(160deg, rgba(22,30,52,0.92) 0%, rgba(14,20,38,0.95) 100%);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 24px; padding: 28px;
            width: 520px; max-width: 92vw;
            max-height: 88vh; overflow-y: auto;
            box-shadow: 0 24px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06);
        }
        .modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
        .form-group label {
            display: block; font-size: 12px; font-weight: 600;
            color: var(--text-muted); margin-bottom: 6px;
        }
        .form-group input, .form-group select {
            width: 100%; padding: 9px 12px;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border-subtle);
            border-radius: 10px; color: var(--text-primary);
            font-size: 14px; outline: none; transition: all 0.2s;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(56,189,248,0.1);
        }
        .modal-actions { display: flex; gap: 10px; }

<script>
let tournaments = {};
let currentTournament = '';
let currentPage = 'bracket';
let zoomScale = 1;
const COL_W = 280, ROW_H = 90;
const STORAGE_KEY = 'bracket_pro_v7';

function loadData() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { try { tournaments = JSON.parse(raw); } catch(e) { tournaments = {}; } }
    if (!Object.keys(tournaments).length) { tournaments = createDefaultData(); saveData(); }
    currentTournament = Object.keys(tournaments)[0];
}
function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(tournaments)); }
function getMatches() { return tournaments[currentTournament] || []; }
function setMatches(matches) { tournaments[currentTournament] = matches; saveData(); }
function getNextId() {
    const matches = getMatches();
    return matches.length === 0 ? 1 : Math.max(...matches.map(m => m.id)) + 1;
}

function isLoserType(t) { return /败者|loser|losers/i.test(t); }
function isFinalType(t) { return /总决赛|final|决赛(?!半)/i.test(t); }
function isSemiType(t) { return /半决赛|semi/i.test(t); }

function createDefaultData() {

    add(8, '败者组', '败者组 R1', null, null, 0, 0, '2026-05-17', '17:00', 10, null);
    add(9, '败者组', '败者组 R2', null, null, 0, 0, '2026-05-20', '16:00', 12, null);
    add(10, '败者组', '败者组 R2', null, null, 0, 0, '2026-05-21', '18:00', 12, null);
    add(11, '胜者组', '胜者组 R3', null, null, 0, 0, '2026-05-22', '18:00', 13, 12);
    add(12, '败者组', '败者组 R3', null, null, 0, 0, '2026-05-23', '17:00', 13, null);
    add(13, '总决赛', '总决赛', null, null, 0, 0, '2026-05-24', '18:00', null, null);
    data['LPL 夏季赛 2026'] = lpl;

    const lck = [];
    const add2 = (id, type, round, a, b, sa, sb, date, time, wn, ln) => {

    };
    add2(1, '胜者组', '胜者组 R1', 'GEN', 'DK',  2, 0, '2026-05-18', '16:00', 3, 5);
    add2(2, '胜者组', '胜者组 R1', 'T1',  'HLE', 2, 1, '2026-05-18', '18:00', 3, 6);
    add2(5, '败者组', '败者组 R1', null, null, 0, 0, '2026-05-20', '15:00', 7, null);
    add2(6, '败者组', '败者组 R1', null, null, 0, 0, '2026-05-20', '17:00', 7, null);

}

function propagate() {
    const matches = getMatches();
    matches.forEach(m => { m.winner = null; m.loser = null; m.isCompleted = false;
        if (m.teamA && m.teamB && m.scoreA !== m.scoreB) {
            if (m.scoreA > m.scoreB) { m.winner = m.teamA; m.loser = m.teamB; }
            else { m.winner = m.teamB; m.loser = m.teamA; }
            m.isCompleted = true;
        }
    });
    for (let iter = 0; iter < 20; iter++) {
        let changed = false;
        for (const m of matches) {
            if (m.winner && m.winNextId) {
                const next = matches.find(x => x.id === m.winNextId);
                if (next && fillSlot(next, m.winner)) changed = true;
            }
            if (m.loser && m.loseNextId) {
                const next = matches.find(x => x.id === m.loseNextId);
                if (next && fillSlot(next, m.loser)) changed = true;
            }
        }
        if (!changed) break;
    }
    setMatches(matches);
}
function fillSlot(match, team) {
    if (!match.teamA) { match.teamA = team; return true; }
    if (!match.teamB && match.teamA !== team) { match.teamB = team; return true; }
    return false;
}

function computeDepth(matches) {
    matches.forEach(m => m.depth = null);
    const hasParent = new Set();
    matches.forEach(m => {
        if (m.winNextId) hasParent.add(m.winNextId);
        if (m.loseNextId) hasParent.add(m.loseNextId);
    });
    matches.forEach(m => { if (!hasParent.has(m.id)) m.depth = 0; });
    let changed = true;
    while (changed) {
        changed = false;
        matches.forEach(m => {
            if (m.depth !== null) return;
            const parents = matches.filter(p => p.winNextId === m.id || p.loseNextId === m.id);
            const ready = parents.filter(p => p.depth !== null);
            if (ready.length === parents.length && parents.length > 0) {
                m.depth = Math.max(...ready.map(p => p.depth)) + 1;
                changed = true;
            }
        });
    }
    matches.forEach(m => { if (m.depth === null) m.depth = 0; });
    const nonFinalMatches = matches.filter(m => !isFinalType(m.type));
    const maxNonFinalDepth = nonFinalMatches.length > 0 ? Math.max(...nonFinalMatches.map(m => m.depth)) : 0;
    matches.filter(m => isFinalType(m.type)).forEach(m => { m.depth = maxNonFinalDepth + 1; });
}

function computeRows(matches) {
    matches.forEach(m => m.idealRow = null);
    const sources = matches.filter(m => m.depth === 0);
    const upperSources = sources.filter(m => !isLoserType(m.type));
    const lowerSources = sources.filter(m => isLoserType(m.type));
    upperSources.sort((a,b) => a.id - b.id).forEach((m, i) => m.idealRow = i * 2);
    lowerSources.sort((a,b) => a.id - b.id).forEach((m, i) => m.idealRow = i * 2);

    let changed = true;
    while (changed) {
        changed = false;
        matches.forEach(m => {
            if (m.idealRow !== null) return;
            const parents = matches.filter(p => p.winNextId === m.id || p.loseNextId === m.id);
            const ready = parents.filter(p => p.idealRow !== null);
            if (ready.length === parents.length && parents.length > 0) {
                m.idealRow = ready.reduce((s, p) => s + p.idealRow, 0) / ready.length;
                changed = true;
            }
        });
    }

    const maxDepth = Math.max(...matches.map(m => m.depth));
    for (let d = 0; d <= maxDepth; d++) {
        const colMatches = matches.filter(m => m.depth === d);
        const upper = colMatches.filter(m => !isLoserType(m.type));
        const lower = colMatches.filter(m => isLoserType(m.type));

        upper.sort((a,b) => a.idealRow - b.idealRow);
        let currentRow = 0;
        upper.forEach((m, i) => {
            if (i === 0) m.gridRow = Math.max(0, Math.round(m.idealRow));
            else m.gridRow = Math.max(currentRow + 2, Math.round(m.idealRow));
            currentRow = m.gridRow;
        });

        const base = upper.length > 0 ? Math.max(...upper.map(m => m.gridRow)) + 4 : 0;
        lower.sort((a,b) => a.idealRow - b.idealRow);
        currentRow = base;
        lower.forEach((m, i) => {
            if (i === 0) m.gridRow = Math.max(base, Math.round(m.idealRow));
            else m.gridRow = Math.max(currentRow + 2, Math.round(m.idealRow));
            currentRow = m.gridRow;
        });
    }
}

function getColName(matches, depth) {
    const colMatches = matches.filter(m => m.depth === depth);
    const finals = colMatches.find(m => isFinalType(m.type));
    if (finals) return '总决赛';
    const semi = colMatches.find(m => isSemiType(m.type));
    if (semi) return '半决赛';
    const upper = colMatches.filter(m => !isLoserType(m.type) && !isFinalType(m.type));
    const lower = colMatches.filter(m => isLoserType(m.type));
    if (upper.length > 0) return upper[0].roundName;
    if (lower.length > 0) return lower[0].roundName;
    return '';
}

function displayId(match) {
    if (isFinalType(match.type)) return 'FINALS';
    return 'GAME' + match.id;
}
function displayRefId(id, matches) {
    const m = matches.find(x => x.id === id);
    if (!m) return 'GAME' + id;
    if (isFinalType(m.type)) return 'FINALS';
    return 'GAME' + id;
}
function tagClass(match) {
    if (isLoserType(match.type)) return 'l-tag';
    if (isFinalType(match.type)) return 'f-tag';
    return 'w-tag';
}
function safeTypeClass(type) {
    return type.replace(/[^a-zA-Z0-9一-龥]/g, '');
}

function renderBracket() {
    propagate();
    const matches = getMatches();
    if (matches.length === 0) {
        document.getElementById('gridHeader').innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:40px;">暂无比赛数据</div>';
        document.getElementById('gridBody').innerHTML = '<svg class="svg-layer" id="svgLayer"><defs><linearGradient id="gradWin"><stop offset="0%" stop-color="#38bdf8" stop-opacity="0.3"/><stop offset="100%" stop-color="#38bdf8" stop-opacity="0.8"/></linearGradient><linearGradient id="gradLose"><stop offset="0%" stop-color="#f87171" stop-opacity="0.3"/><stop offset="100%" stop-color="#f87171" stop-opacity="0.8"/></linearGradient></defs></svg>';
        return;
    }

    computeDepth(matches);
    computeRows(matches);

    const maxDepth = Math.max(...matches.map(m => m.depth));
    const maxRow = Math.max(...matches.map(m => m.gridRow || 0));

    const headerEl = document.getElementById('gridHeader');
    headerEl.innerHTML = '';
    for (let d = 0; d <= maxDepth; d++) {
        const div = document.createElement('div');
        div.className = 'col-header';
        div.textContent = getColName(matches, d);
        headerEl.appendChild(div);
    }

    const bodyEl = document.getElementById('gridBody');
    const svgEl = document.getElementById('svgLayer');
    bodyEl.innerHTML = '';
    bodyEl.appendChild(svgEl);
    bodyEl.style.height = ((maxRow + 2) * ROW_H) + 'px';
    bodyEl.style.width = ((maxDepth + 1) * COL_W) + 'px';

    matches.forEach(m => {
        if (m.depth === undefined || m.gridRow === undefined) return;
        const card = createCard(m, matches);
        card.style.left = (m.depth * COL_W + 15) + 'px';
        card.style.top = (m.gridRow * ROW_H + 4) + 'px';
        bodyEl.appendChild(card);
    });

    requestAnimationFrame(() => drawConnections(matches, maxDepth, maxRow));
}

function createCard(match, allMatches) {
    const isFinal = isFinalType(match.type);
    const card = document.createElement('div');
    card.className = `match-card type-${safeTypeClass(match.type)} ${isFinal ? 'is-final' : ''}`;
    card.dataset.id = match.id;
    card.onclick = () => openModal(match.id);

    const teamA = match.teamA || '待定';
    const teamB = match.teamB || '待定';
    const done = match.isCompleted;

    const clsA = match.winner === match.teamA ? 'win' : (match.loser === match.teamA ? 'lose' : 'pending');
    const clsB = match.winner === match.teamB ? 'win' : (match.loser === match.teamB ? 'lose' : 'pending');
    const avaA = match.winner === match.teamA ? 'winner' : (match.loser === match.teamA ? 'loser' : '');
    const avaB = match.winner === match.teamB ? 'winner' : (match.loser === match.teamB ? 'loser' : '');

    const status = done ? '<span class="match-status done">已结束</span>' :
                   (match.teamA && match.teamB ? '<span class="match-status wait">未开始</span>' :
                   '<span class="match-status unk">待定</span>');

    const scoreCls = done ? 'done' : 'vs';
    const scoreText = done ? `${match.scoreA} : ${match.scoreB}` : 'VS';

    const winRef = match.winNextId ? displayRefId(match.winNextId, allMatches) : '';
    const loseRef = match.loseNextId ? displayRefId(match.loseNextId, allMatches) : '';

    const crownHtml = isFinal ? '<div class="finals-crown"><i class="fas fa-crown"></i></div>' : '';

    card.innerHTML = `
        ${crownHtml}
        <div class="match-card-header">
            <div class="match-meta">
                <span class="match-id-tag ${tagClass(match)}">${displayId(match)}</span>
                <span class="match-round-tag">${match.roundName}</span>
            </div>
            ${status}
        </div>
        <div class="match-body">
            <div class="team-side">
                <div class="team-avatar ${avaA}">${teamA.charAt(0)}</div>
                <span class="team-name ${clsA}">${teamA}</span>
            </div>
            <div class="score-center ${scoreCls}">${scoreText}</div>
            <div class="team-side right">
                <span class="team-name ${clsB}">${teamB}</span>
                <div class="team-avatar ${avaB}">${teamB.charAt(0)}</div>
            </div>
        </div>
        <div class="match-footer">
            <div class="match-time">
                <i class="far fa-calendar-alt"></i>
                <span>${match.date || '日期待定'} ${match.time || ''}</span>
            </div>
            <div class="match-links">
                ${winRef ? `<span class="match-link win-link" title="胜者晋级"><i class="fas fa-arrow-up"></i>${winRef}</span>` : ''}
                ${loseRef ? `<span class="match-link lose-link" title="败者落位"><i class="fas fa-arrow-down"></i>${loseRef}</span>` : ''}
            </div>
        </div>`;
    return card;
}

function drawConnections(matches, maxDepth, maxRow) {
    const svg = document.getElementById('svgLayer');
    const w = (maxDepth + 1) * COL_W;
    const h = (maxRow + 2) * ROW_H;
    svg.setAttribute('width', w);
    svg.setAttribute('height', h);
    svg.style.width = w + 'px';
    svg.style.height = h + 'px';

    const defs = svg.querySelector('defs');
    svg.innerHTML = '';
    svg.appendChild(defs);

    matches.forEach(m => {
        if (m.winNextId) drawLine(svg, m, m.winNextId, 'win-path', matches);
        if (m.loseNextId) drawLine(svg, m, m.loseNextId, 'lose-path', matches);
    });
}

function drawLine(svg, fromMatch, toId, className, allMatches) {
    const fromCard = document.querySelector(`.match-card[data-id="${fromMatch.id}"]`);
    const toCard = document.querySelector(`.match-card[data-id="${toId}"]`);
    if (!fromCard || !toCard) return;

    const body = document.getElementById('gridBody');
    const bRect = body.getBoundingClientRect();
    const fRect = fromCard.getBoundingClientRect();
    const tRect = toCard.getBoundingClientRect();

    // 关键修复：将屏幕像素转换为逻辑坐标，以适配 CSS transform 缩放
    const x1 = (fRect.right - bRect.left) / zoomScale;
    const y1 = (fRect.top + fRect.height / 2 - bRect.top) / zoomScale;
    const x2 = (tRect.left - bRect.left) / zoomScale;
    const y2 = (tRect.top + tRect.height / 2 - bRect.top) / zoomScale;

    const cp1x = x1 + (x2 - x1) * 0.5;
    const cp2x = x2 - (x2 - x1) * 0.5;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M ${x1} ${y1} C ${cp1x} ${y1}, ${cp2x} ${y2}, ${x2} ${y2}`);
    path.setAttribute('class', className);
    svg.appendChild(path);
}

function updateTypeList() {
    const matches = getMatches();
    const types = [...new Set(matches.map(m => m.type))];
    const datalist = document.getElementById('typeList');
    datalist.innerHTML = '';
    const defaults = ['胜者组', '败者组', '半决赛', '总决赛'];
    [...defaults, ...types.filter(t => !defaults.includes(t))].forEach(t => {
        const opt = document.createElement('option'); opt.value = t; datalist.appendChild(opt);
    });
}

function renderAdmin() {
    const matches = getMatches();
    const tbody = document.getElementById('adminTable');
    tbody.innerHTML = '';

    matches.sort((a,b) => a.id - b.id).forEach(m => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><b>${displayId(m)}</b></td>
            <td><input class="admin-input" value="${m.type}" onchange="updateField(${m.id},'type',this.value)" style="width:100px" list="adminTypeList"></td>
            <td><input class="admin-input" value="${m.roundName||''}" onchange="updateField(${m.id},'roundName',this.value)"></td>
            <td><input class="admin-input" value="${m.teamA||''}" onchange="updateField(${m.id},'teamA',this.value)"></td>
            <td><input class="admin-input" value="${m.teamB||''}" onchange="updateField(${m.id},'teamB',this.value)"></td>
            <td><input class="admin-input" value="${m.scoreA}:${m.scoreB}" onchange="updateScore(${m.id},this.value)" style="width:70px"></td>
            <td><input class="admin-input" type="date" value="${m.date||''}" onchange="updateField(${m.id},'date',this.value)" style="width:120px"></td>
            <td><input class="admin-input" type="time" value="${m.time||''}" onchange="updateField(${m.id},'time',this.value)" style="width:90px"></td>
            <td><input class="admin-input" type="number" value="${m.winNextId||''}" onchange="updateField(${m.id},'winNextId',this.value?parseInt(this.value):null)" style="width:70px"></td>
            <td><input class="admin-input" type="number" value="${m.loseNextId||''}" onchange="updateField(${m.id},'loseNextId',this.value?parseInt(this.value):null)" style="width:70px"></td>
            <td><button class="del-row-btn" onclick="deleteMatch(${m.id})"><i class="fas fa-trash"></i></button></td>
        `;
        tbody.appendChild(tr);
    });

    let adminDatalist = document.getElementById('adminTypeList');
    if (!adminDatalist) {
        adminDatalist = document.createElement('datalist');
        adminDatalist.id = 'adminTypeList';
        document.body.appendChild(adminDatalist);
    }
    adminDatalist.innerHTML = '';
    const types = [...new Set(matches.map(m => m.type))];
    const defaults = ['胜者组', '败者组', '半决赛', '总决赛'];
    [...defaults, ...types.filter(t => !defaults.includes(t))].forEach(t => {
        const opt = document.createElement('option'); opt.value = t; adminDatalist.appendChild(opt);
    });

    document.getElementById('adminSubTitle').textContent = `${currentTournament} · ${matches.length} 场比赛`;
}

function updateField(id, field, value) {
    const matches = getMatches();
    const m = matches.find(x => x.id === id);
    if (!m) return;
    m[field] = value;
    setMatches(matches);
    showSaveStatus();
    if (currentPage === 'bracket') renderBracket();
}
function updateScore(id, val) {
    const parts = val.split(':');
    const matches = getMatches();
    const m = matches.find(x => x.id === id);
    if (m) {
        m.scoreA = parseInt(parts[0]) || 0;
        m.scoreB = parseInt(parts[1]) || 0;
        setMatches(matches);
        showSaveStatus();
        if (currentPage === 'bracket') renderBracket();
    }
}
function deleteMatch(id) {
    if (!confirm('确定删除这场比赛？')) return;
    let matches = getMatches();
    const idx = matches.findIndex(m => m.id === id);
    if (idx === -1) return;
    matches.splice(idx, 1);
    matches.forEach(m => {
        if (m.id > id) m.id -= 1;
        if (m.winNextId === id) m.winNextId = null;
        else if (m.winNextId && m.winNextId > id) m.winNextId -= 1;
        if (m.loseNextId === id) m.loseNextId = null;
        else if (m.loseNextId && m.loseNextId > id) m.loseNextId -= 1;
    });
    setMatches(matches);
    renderAdmin();
    if (currentPage === 'bracket') renderBracket();
}
function showSaveStatus() {
    const el = document.getElementById('adminStatus');
    el.style.display = 'inline-flex';
    clearTimeout(window._saveTimer);
    window._saveTimer = setTimeout(() => el.style.display = 'none', 2000);
}

function openModal(id = null) {
    updateTypeList();
    const overlay = document.getElementById('modalOverlay');
    const title = document.getElementById('modalTitle');
    const editId = document.getElementById('editId');

    if (id) {
        const m = getMatches().find(x => x.id === id);
        if (!m) return;
        title.textContent = '编辑比赛 ' + displayId(m);
        editId.value = id;
        document.getElementById('mType').value = m.type;
        document.getElementById('mRound').value = m.roundName || '';
        document.getElementById('mTeamA').value = m.teamA || '';
        document.getElementById('mTeamB').value = m.teamB || '';
        document.getElementById('mScoreA').value = m.scoreA;
        document.getElementById('mScoreB').value = m.scoreB;
        document.getElementById('mDate').value = m.date || '';
        document.getElementById('mTime').value = m.time || '';
        document.getElementById('mWinNext').value = m.winNextId || '';
        document.getElementById('mLoseNext').value = m.loseNextId || '';
    } else {
        title.textContent = '添加比赛';
        editId.value = '';
        document.getElementById('mType').value = '胜者组';
        ['mRound','mTeamA','mTeamB','mDate','mTime','mWinNext','mLoseNext'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('mScoreA').value = 0;
        document.getElementById('mScoreB').value = 0;
    }
    overlay.classList.add('show');
}
function closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
}
function saveMatch() {
    const editId = document.getElementById('editId').value;
    const matches = getMatches();
    const newMatch = {
        id: editId ? parseInt(editId) : getNextId(),
        type: document.getElementById('mType').value || '未分类',
        roundName: document.getElementById('mRound').value || '未命名',
        teamA: document.getElementById('mTeamA').value || null,
        teamB: document.getElementById('mTeamB').value || null,
        scoreA: parseInt(document.getElementById('mScoreA').value) || 0,
        scoreB: parseInt(document.getElementById('mScoreB').value) || 0,
        date: document.getElementById('mDate').value || '',
        time: document.getElementById('mTime').value || '',
        winNextId: document.getElementById('mWinNext').value ? parseInt(document.getElementById('mWinNext').value) : null,
        loseNextId: document.getElementById('mLoseNext').value ? parseInt(document.getElementById('mLoseNext').value) : null
    };
    if (editId) {
        const idx = matches.findIndex(m => m.id == editId);
        if (idx !== -1) matches[idx] = newMatch;
        else matches.push(newMatch);
    } else {
        matches.push(newMatch);
    }
    setMatches(matches);
    closeModal();
    if (currentPage === 'bracket') renderBracket();
    else renderAdmin();
}

function renderTournamentList() {
    const container = document.getElementById('tournamentList');
    container.innerHTML = '';
    Object.keys(tournaments).forEach(name => {
        const div = document.createElement('div');
        div.className = 'tournament-item ' + (name === currentTournament ? 'active' : '');
        div.innerHTML = `<span class="truncate">${name}</span><button class="del-btn" onclick="event.stopPropagation();delTournament('${name.replace(/'/g,"\\'")}')"><i class="fas fa-times"></i></button>`;
        div.onclick = () => switchTournament(name);
        container.appendChild(div);
    });
}
function switchTournament(name) {
    currentTournament = name;
    renderTournamentList();
    document.getElementById('tournamentName').textContent = name;
    if (currentPage === 'bracket') renderBracket();
    else renderAdmin();
}
function addTournament() {
    const name = prompt('新赛事名称:', '新赛事 ' + (Object.keys(tournaments).length + 1));
    if (!name || tournaments[name]) return;
    tournaments[name] = [];
    saveData();
    renderTournamentList();
    switchTournament(name);
}
function delTournament(name) {
    if (!confirm(`删除赛事 "${name}"？`)) return;
    delete tournaments[name];
    saveData();
    const keys = Object.keys(tournaments);
    if (keys.length === 0) { tournaments['默认赛事'] = []; saveData(); }
    if (currentTournament === name) switchTournament(Object.keys(tournaments)[0]);
    else renderTournamentList();
}

function switchPage(page) {
    currentPage = page;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    const tabId = page === 'bracket' ? 'tab-bracket' : 'tab-admin-admin';
    const el = document.getElementById(tabId);
    if (el) el.classList.add('active');
    const el2 = document.getElementById(page === 'bracket' ? 'tab-admin-bracket' : 'tab-admin');
    if (el2) el2.classList.add('active');
    if (page === 'bracket') renderBracket();
    else renderAdmin();
}
function syncBracket() { renderBracket(); }

function zoom(delta) {
    zoomScale = Math.max(0.3, Math.min(2, zoomScale + delta));
    document.getElementById('canvas').style.transform = `scale(${zoomScale})`;
    document.getElementById('zoomVal').textContent = Math.round(zoomScale * 100) + '%';
}
function zoomTo(v) {
    zoomScale = v;
    document.getElementById('canvas').style.transform = `scale(${zoomScale})`;
    document.getElementById('zoomVal').textContent = Math.round(zoomScale * 100) + '%';
}

function exportData() {
    const blob = new Blob([JSON.stringify(tournaments, null, 2)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'tournaments_backup.json';
    a.click();
    URL.revokeObjectURL(a.href);
}
function importData() {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = '.json';
    input.onchange = e => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = ev => {
            try {
                tournaments = JSON.parse(ev.target.result);
                saveData();
                renderTournamentList();
                switchTournament(Object.keys(tournaments)[0]);
                alert('导入成功');
            } catch { alert('文件格式错误'); }
        };
        reader.readAsText(file);
    };
    input.click();
}

function initParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 25; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = (8 + Math.random() * 8) + 's';
        p.style.animationDelay = Math.random() * 10 + 's';
        p.style.width = p.style.height = (2 + Math.random() * 3) + 'px';
        container.appendChild(p);
    }

    const colors = ['rgba(56,189,248,0.25)', 'rgba(167,139,250,0.2)', 'rgba(251,191,36,0.2)', 'rgba(244,114,182,0.2)'];
    for (let i = 0; i < 4; i++) {
        const blob = document.createElement('div');
        blob.className = 'glow-blob';
        const size = 200 + Math.random() * 300;
        blob.style.width = size + 'px';
        blob.style.height = size + 'px';
        blob.style.background = colors[i % colors.length];
        blob.style.left = (Math.random() * 80) + '%';
        blob.style.top = (Math.random() * 80) + '%';
        blob.style.animationDelay = (i * 4) + 's';
        blob.style.animationDuration = (14 + Math.random() * 8) + 's';
        container.appendChild(blob);
    }

    for (let i = 0; i < 3; i++) {
        const aurora = document.createElement('div');
        aurora.className = 'aurora';
        aurora.style.top = (20 + i * 30) + '%';
        aurora.style.animationDelay = (i * 6) + 's';
        aurora.style.animationDuration = (18 + Math.random() * 6) + 's';
        aurora.style.opacity = 0.3 + Math.random() * 0.3;
        container.appendChild(aurora);
    }
}

window.addEventListener('resize', () => {
    if (currentPage === 'bracket') {
        const matches = getMatches();
        if (matches.length > 0) {
            const maxDepth = Math.max(...matches.map(m => m.depth || 0));
            const maxRow = Math.max(...matches.map(m => m.gridRow || 0));
            drawConnections(matches, maxDepth, maxRow);
        }
    }
});
document.getElementById('viewport').addEventListener('wheel', e => {
    if (e.ctrlKey) { e.preventDefault(); zoom(e.deltaY > 0 ? -0.05 : 0.05); }
}, {passive: false});
document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
});

loadData();
initParticles();
renderTournamentList();
document.getElementById('tournamentName').textContent = currentTournament;
renderBracket();
</script>
</body>
</html>
