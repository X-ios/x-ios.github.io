<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>赛程工坊 Pro · 双败淘汰</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');

        :root {
            --bg: #080c18;
            --panel: rgba(255,255,255,0.03);
            --panel-hover: rgba(255,255,255,0.06);
            --glass-border: rgba(255,255,255,0.06);
            --glass-highlight: rgba(255,255,255,0.10);
            --text: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --accent-gold: #fbbf24;
            --accent-cyan: #38bdf8;
            --accent-red: #f87171;
            --accent-green: #34d399;
            --accent-purple: #a78bfa;
            --col-w: 340px;
            --gap: 160px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            font-family: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
            background: transparent;
            color: var(--text);
            height: 100%;
            overflow: hidden;
        }

        /* ========== 全局动态背景系统 ========== */
        .dynamic-bg {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bg-bright {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #f5576c 75%, #4facfe 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }
        .bg-bright::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at 20% 80%, rgba(255,255,255,0.4) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255,223,128,0.3) 0%, transparent 50%);
            animation: floatLight 8s ease-in-out infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes floatLight {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.5; }
            33% { transform: translate(30px, -30px) scale(1.1); opacity: 0.7; }
            66% { transform: translate(-20px, 20px) scale(0.9); opacity: 0.4; }
        }

        /* ========== 应用层级 ========== */
        .app-layer {
            position: relative; z-index: 1; height: 100%;
            display: flex; flex-direction: column;
        }

        .app-header {
            position: relative; z-index: 50; flex-shrink: 0; height: 56px;
            background: linear-gradient(180deg, rgba(8,11,20,0.85) 0%, rgba(8,11,20,0.6) 100%);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; gap: 16px;
        }
        .header-left, .header-right { display: flex; align-items: center; gap: 12px; }
        .brand {
            display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 16px;
            background: linear-gradient(135deg, #fbbf24, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            flex-shrink: 0;
        }
        .brand i { font-size: 18px; -webkit-text-fill-color: var(--accent-gold); }

        .tournament-selector { position: relative; }
        .selector-trigger {
            display: flex; align-items: center; gap: 8px; padding: 6px 12px;
            background: var(--panel); border: 1px solid var(--glass-border); border-radius: 10px;
            color: var(--text-secondary); font-size: 13px; font-weight: 600; cursor: pointer;
            transition: all .2s; white-space: nowrap;
        }
        .selector-trigger:hover { background: var(--panel-hover); color: var(--text); border-color: var(--glass-highlight); }
        .selector-trigger i { font-size: 10px; color: var(--text-muted); transition: transform .2s; }
        .selector-trigger.open i { transform: rotate(180deg); }
        .selector-panel {
            position: absolute; top: calc(100% + 8px); left: 0; width: 260px;
            background: linear-gradient(180deg, rgba(18,24,42,0.98), rgba(10,14,26,0.98));
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid var(--glass-border); border-radius: 16px;
            padding: 10px; box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            opacity: 0; pointer-events: none; transform: translateY(-6px); transition: all .2s;
        }
        .selector-panel.open { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .panel-header { display: flex; justify-content: space-between; align-items: center; padding: 4px 6px 10px; border-bottom: 1px solid var(--glass-border); margin-bottom: 6px; }
        .panel-header span { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; }
        .panel-header button {
            background: transparent; border: none; color: var(--accent-gold); font-size: 12px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 4px; padding: 2px 6px; border-radius: 6px;
        }
        .panel-header button:hover { background: rgba(251,191,36,0.08); }
        .panel-item {
            display: flex; justify-content: space-between; align-items: center; padding: 8px 10px;
            border-radius: 10px; cursor: pointer; font-size: 13px; color: var(--text-secondary); transition: all .15s;
        }
        .panel-item:hover { background: var(--panel-hover); color: var(--text); }
        .panel-item.active { background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(139,92,246,0.15)); color: #fff; font-weight: 600; }
        .panel-item .del-btn {
            opacity: 0; width: 22px; height: 22px; border-radius: 6px; border: none; background: transparent;
            color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s;
        }
        .panel-item:hover .del-btn { opacity: 1; }
        .panel-item .del-btn:hover { background: rgba(239,68,68,0.12); color: #ef4444; }

        .header-nav { display: flex; align-items: center; gap: 4px; background: rgba(0,0,0,0.25); padding: 3px; border-radius: 12px; }
        .nav-item {
            padding: 6px 14px; border-radius: 10px; border: none; background: transparent;
            color: var(--text-muted); font-size: 13px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 6px; transition: all .2s;
        }
        .nav-item:hover { color: var(--text); }
        .nav-item.active {
            background: linear-gradient(135deg, rgba(99,102,241,0.35), rgba(139,92,246,0.25));
            color: #fff; box-shadow: 0 2px 10px rgba(99,102,241,0.2);
        }

        .header-right .btn-icon {
            width: 32px; height: 32px; border-radius: 8px; border: none; background: var(--panel);
            color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all .2s; border: 1px solid transparent;
        }
        .header-right .btn-icon:hover { background: var(--panel-hover); color: var(--text); border-color: var(--glass-border); }
        .btn-primary {
            padding: 6px 14px; border-radius: 10px; border: none; background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff; font-size: 12px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
            box-shadow: 0 2px 10px rgba(99,102,241,0.25); transition: all .2s;
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(99,102,241,0.35); }
        .btn-success {
            padding: 6px 14px; border-radius: 10px; border: none; background: linear-gradient(135deg, #10b981, #059669);
            color: #fff; font-size: 12px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
            box-shadow: 0 2px 10px rgba(16,185,129,0.25); transition: all .2s;
        }
        .btn-success:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(16,185,129,0.35); }
        .btn-warning {
            padding: 6px 14px; border-radius: 10px; border: none; background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #fff; font-size: 12px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
            box-shadow: 0 2px 10px rgba(245,158,11,0.25); transition: all .2s;
        }
        .btn-warning:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(245,158,11,0.35); }
        .zoom-group-h {
            display: flex; align-items: center; gap: 4px; background: rgba(0,0,0,0.25); padding: 2px 8px; border-radius: 10px;
        }
        .zoom-group-h button {
            width: 22px; height: 22px; border-radius: 6px; border: none; background: transparent;
            color: var(--text-muted); cursor: pointer; font-size: 10px; display: flex; align-items: center; justify-content: center;
        }
        .zoom-group-h button:hover { background: rgba(255,255,255,0.08); color: var(--text); }
        .zoom-group-h span { font-size: 11px; font-weight: 700; color: var(--text-secondary); min-width: 32px; text-align: center; }

        .app-main {
            flex: 1; position: relative; z-index: 1;
            min-height: 0; overflow: hidden;
            display: flex; flex-direction: column;
        }
        .view {
            display: none; flex: 1; flex-direction: column;
            min-height: 0; overflow: hidden;
            padding: 16px 20px 20px;
        }
        .view.active { display: flex; }

        .page-title-bar {
            display: flex; justify-content: space-between; align-items: flex-end;
            margin-bottom: 12px; flex-shrink: 0;
        }
        .page-title-bar h2 {
            font-size: 20px; font-weight: 800;
            background: linear-gradient(135deg, #fbbf24, #f472b6, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .page-title-bar p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .page-actions { display: flex; gap: 8px; }

        /* ========== 对阵图区域 ========== */
        .bracket-viewport {
            flex: 1;
            overflow: hidden;
            border-radius: 20px;
            min-height: 0;
            background: rgba(0,0,0,0.15);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), 0 8px 32px rgba(0,0,0,0.25);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .bracket-header-fixed {
            flex-shrink: 0;
            padding: 12px 20px 0px;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(8,11,20,0.4);
            backdrop-filter: blur(8px);
            z-index: 10;
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: none;
        }
        .bracket-header-fixed::-webkit-scrollbar { display: none; }

        .bracket-scroll-area {
            flex: 1;
            overflow: auto;
            min-height: 0;
            padding: 16px 20px 20px;
            scrollbar-width: thin;
            scrollbar-color: transparent transparent;
            transition: scrollbar-color 0.3s;
        }
        .bracket-scroll-area:hover,
        .bracket-scroll-area:active,
        .bracket-scroll-area:focus-within {
            scrollbar-color: rgba(255,255,255,0.08) transparent;
        }
        .bracket-scroll-area::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .bracket-scroll-area::-webkit-scrollbar-track {
            background: transparent;
        }
        .bracket-scroll-area::-webkit-scrollbar-thumb {
            background: transparent;
            border-radius: 4px;
            transition: background 0.3s;
        }
        .bracket-scroll-area:hover::-webkit-scrollbar-thumb,
        .bracket-scroll-area:active::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.12);
        }
        .bracket-scroll-area::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.2);
        }

        .bracket-canvas {
            position: relative;
            display: block;
            width: fit-content;
            height: fit-content;
            min-width: 100%;
            min-height: 100%;
        }

        .grid-header { display: flex; padding-left: 10px; }
        .col-header {
            width: var(--col-w); flex-shrink: 0; text-align: center; font-size: 12px;
            font-weight: 700; color: var(--accent-gold); letter-spacing: 0.08em;
            padding: 6px 0; border-bottom: 1px solid rgba(251,191,36,0.12);
        }
        .grid-body { position: relative; }
        .svg-layer { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 0; }
        .svg-layer path {
            fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round;
            opacity: 0.7; transition: opacity 0.3s, stroke-width 0.3s;
        }
        .svg-layer path:hover { opacity: 0.85; stroke-width: 3.5; }
        .svg-layer .win-path { stroke: url(#gradWin); }
        .svg-layer .lose-path { stroke: url(#gradLose); }

        /* ========== Glass Card 比赛卡片 ========== */
        .match-card {
            position: absolute; width: 250px; height: auto; min-height: 82px;
            padding: 10px;
            background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.08) 100%);
            backdrop-filter: blur(24px) saturate(1.4);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 16px;
            overflow: visible; cursor: pointer; transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.15);
            z-index: 1;
        }
        .match-card::before {
            content: ''; position: absolute; top: 0; left: 16px; right: 16px; height: 2px; opacity: 0.7; transition: opacity 0.3s;
            border-radius: 2px;
        }
        .match-card.type-winners::before, .match-card.type-胜者组::before, .match-card.type-晋级赛::before, .match-card.type-小组赛::before {
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
        }
        .match-card.type-losers::before, .match-card.type-败者组::before {
            background: linear-gradient(90deg, transparent, var(--accent-red), transparent);
        }
        .match-card.type-final::before, .match-card.type-总决赛::before, .match-card.type-决赛::before, .match-card.type-半决赛::before {
            background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
        }
        .match-card:hover {
            transform: translateY(-2px) scale(1.02);
            background: linear-gradient(135deg, rgba(255,255,255,0.24) 0%, rgba(255,255,255,0.14) 100%);
            border-color: rgba(255,255,255,0.28);
            box-shadow: 0 16px 40px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
            z-index: 10;
        }
        .match-card:hover::before { opacity: 1; }
        .match-card.is-final {
            border-color: rgba(251,191,36,0.4);
            box-shadow: 0 0 30px rgba(251,191,36,0.12), 0 8px 32px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.15);
        }
        .match-card.is-final:hover {
            border-color: rgba(251,191,36,0.6);
            box-shadow: 0 0 45px rgba(251,191,36,0.22), 0 16px 40px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .finals-crown {
            position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
            width: 34px; height: 34px; background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 14px; color: #fff; border: 2px solid rgba(255,255,255,0.35);
            box-shadow: 0 0 28px rgba(251,191,36,0.6), 0 4px 12px rgba(0,0,0,0.4);
            z-index: 5; pointer-events: none; animation: crownFloat 3s ease-in-out infinite;
        }
        @keyframes crownFloat { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(-5px)} }

        .match-card-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 0 4px; border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .match-meta { display: flex; align-items: center; gap: 6px; }
        .match-id-tag {
            font-family: 'Inter', monospace; font-size: 10px; font-weight: 800; padding: 1px 6px; border-radius: 10px;
        }
        .match-id-tag.w-tag { color: var(--accent-cyan); background: rgba(56,189,248,0.1); }
        .match-id-tag.l-tag { color: var(--accent-red); background: rgba(248,113,113,0.1); }
        .match-id-tag.f-tag { color: var(--accent-gold); background: rgba(251,191,36,0.1); }
        .match-round-tag { font-size: 10px; font-weight: 500; color: var(--text-muted); }
        .match-status {
            font-size: 9px; font-weight: 700; letter-spacing: 0.03em; padding: 2px 6px; border-radius: 10px;
        }
        .match-status.done { background: rgba(52,211,153,0.12); color: var(--accent-green); border: 1px solid rgba(52,211,153,0.18); }
        .match-status.wait { background: rgba(148,163,184,0.08); color: var(--text-muted); border: 1px solid rgba(148,163,184,0.12); }
        .match-status.unk { background: rgba(100,116,139,0.08); color: var(--text-muted); border: 1px solid rgba(100,116,139,0.1); }

        .match-body {
            display: flex; align-items: center; justify-content: space-between; padding: 6px 0; gap: 4px;
        }
        .team-side { display: flex; align-items: center; gap: 7px; flex: 1; min-width: 0; }
        .team-side.right { justify-content: flex-end; }
        .team-avatar {
            width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 700; overflow: hidden;
            background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(168,85,247,0.15));
            border: 1px solid rgba(255,255,255,0.08); color: #c7d2fe;
        }
        .team-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .team-avatar.winner {
            background: linear-gradient(135deg, rgba(52,211,153,0.25), rgba(45,212,191,0.2));
            border-color: rgba(52,211,153,0.3); color: #6ee7b7; box-shadow: 0 0 10px rgba(52,211,153,0.12);
        }
        .team-avatar.loser { background: rgba(100,116,139,0.1); border-color: rgba(100,116,139,0.15); color: var(--text-muted); }
        .team-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .team-name.win { color: var(--accent-green); text-shadow: 0 0 8px rgba(52,211,153,0.15); }
        .team-name.lose { color: var(--text-muted); text-decoration: line-through; text-decoration-color: rgba(248,113,113,0.35); text-decoration-thickness: 1.5px; }
        .team-name.pending { color: var(--text-secondary); }

        /* ========== 比分样式 ========== */
        .score-center {
            font-family: 'Inter', monospace; font-weight: 800; font-size: 14px; min-width: 42px; text-align: center; letter-spacing: 0.05em; flex-shrink: 0;
        }
        .score-center.vs { color: var(--text-muted); font-size: 12px; font-weight: 600; }
        .score-win {
            font-size: 16px;
            background: linear-gradient(135deg, #34d399, #2dd4bf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
        .score-lose {
            font-size: 13px;
            color: var(--text-muted);
            opacity: 0.4;
            text-decoration: line-through;
            text-decoration-color: rgba(248,113,113,0.3);
            text-decoration-thickness: 1.5px;
            font-weight: 500;
        }
        .score-sep {
            margin: 0 3px;
            color: var(--text-muted);
            font-size: 12px;
            opacity: 0.5;
            font-weight: 600;
        }

        .match-footer {
            display: flex; justify-content: space-between; align-items: center; padding: 4px 0 0; border-top: 1px solid rgba(255,255,255,0.04);
        }
        .match-time { font-size: 10px; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }
        .match-links { display: flex; gap: 8px; font-size: 10px; }
        .match-link { display: flex; align-items: center; gap: 2px; }
        .match-link.win-link { color: rgba(56,189,248,0.5); }
        .match-link.lose-link { color: rgba(248,113,113,0.5); }

        .admin-wrap {
            flex: 1; overflow: auto; border-radius: 16px; min-height: 0;
            background: rgba(0,0,0,0.12); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); padding: 16px;
        }
        .admin-table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        .admin-table th {
            background: rgba(255,255,255,0.03); font-size: 11px; font-weight: 700; letter-spacing: 0.05em;
            color: var(--text-muted); text-transform: uppercase; padding: 10px; text-align: left; border-bottom: 1px solid var(--glass-border);
        }
        .admin-table td { padding: 8px 10px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.03); color: var(--text-secondary); vertical-align: middle; }
        .admin-table tr:hover td { background: rgba(255,255,255,0.02); }
        .admin-table .team-chip { display: inline-flex; align-items: center; gap: 6px; }
        .admin-table .team-chip .mini-avatar {
            width: 20px; height: 20px; border-radius: 6px; font-size: 10px; font-weight: 700;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .admin-table .team-chip .mini-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .admin-input {
            background: rgba(0,0,0,0.35); border: 1px solid var(--glass-border); border-radius: 8px; padding: 6px 10px;
            color: var(--text); font-size: 13px; width: 100%; outline: none; transition: all .2s;
        }
        .admin-input:focus { border-color: var(--accent-cyan); box-shadow: 0 0 0 3px rgba(56,189,248,0.08); }
        .admin-input[type="number"] { width: 70px; }

<script>
// ===================== 版本自刷新 =====================
const HTML_VERSION = 'v605'; // ← 每次更新文件时修改这个版本号（如 v7, v8...）
(function() {
    const saved = localStorage.getItem('bracket_html_version');
    const url = new URL(location.href);
    // 如果版本不一致，且这次不是已经被刷新过的，则强制刷新
    if (saved !== HTML_VERSION && !url.searchParams.has('_r')) {
        localStorage.setItem('bracket_html_version', HTML_VERSION);
        url.searchParams.set('_r', Date.now().toString());
        location.replace(url.toString()); // 替换当前历史记录，不留后退缓存
        // 阻止后续脚本执行，等待页面刷新
        throw new Error('Version mismatch, reloading...');
    }
    // 清理 URL 中的刷新参数（可选，让地址栏更干净）
    if (url.searchParams.has('_r') && saved === HTML_VERSION) {
        url.searchParams.delete('_r');
        history.replaceState(null, '', url.toString());
    }
})();


// ===================== 数据核心 =====================
let appData = { tournaments: {}, teams: {}, settings: { currentTournament: '' } };
let currentTournament = '';
let currentView = 'bracket';
let zoomScale = 1;
const COL_W = 340, GAP = 160;
const STORAGE_KEY = 'bracket_pro_v11';
const IS_EXPORT_MODE = false; // 导出时会替换为 true

function loadData() {
    // 检查是否是导出模式
    if (document.body.classList.contains('export-mode')) {
        return;
    }

    // 数据版本号 - 每次数据结构变更时递增
    const DATA_VERSION = 'v5';
    const VERSION_KEY = 'bracket_pro_version';

    let storageAvailable = false;
    try {
        const test = '__storage_test__';
        localStorage.setItem(test, test);
        localStorage.removeItem(test);
        storageAvailable = true;
    } catch (e) {
        console.warn('localStorage not available (file:// or private mode):', e);
    }

    if (storageAvailable) {
        try {
            const savedVersion = localStorage.getItem(VERSION_KEY);
            const raw = localStorage.getItem(STORAGE_KEY);

            // 如果版本不匹配或没有数据，使用默认数据
            if (savedVersion !== DATA_VERSION || !raw) {
                console.log('Data version mismatch or no data, using default');
                appData = createDefaultData();
                currentTournament = appData.settings.currentTournament;
                saveData();
                localStorage.setItem(VERSION_KEY, DATA_VERSION);
                return;
            }

            if (raw) {
                const parsed = JSON.parse(raw);
                if (parsed && typeof parsed === 'object' && parsed.tournaments && typeof parsed.teams === 'object') {
                    appData = parsed;
                    currentTournament = (appData.settings && appData.settings.currentTournament) || Object.keys(appData.tournaments)[0] || '';
                    if (!currentTournament) throw new Error('No tournament');
                    return;
                }
            }
        } catch (e) {
            console.warn('Data load failed, resetting:', e);
            try { localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(VERSION_KEY); } catch (_) {}
        }
    }
    appData = createDefaultData();
    currentTournament = appData.settings.currentTournament;
}
function saveData() {
    if (IS_EXPORT_MODE) return;
    appData.settings.currentTournament = currentTournament;
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
    } catch (e) {
        console.warn('Save failed (localStorage unavailable):', e);
    }
}

function getMatches() { return appData.tournaments[currentTournament] || []; }
function setMatches(matches) { appData.tournaments[currentTournament] = matches; saveData(); }
function getNextId() {
    const matches = getMatches();
    return matches.length === 0 ? 1 : Math.max(...matches.map(m => m.id)) + 1;
}
function getTeam(name) {
    if (!name) return { name: '', short: '?', color: null, icon: null };
    return appData.teams[name] || { name, short: name.charAt(0), color: null, icon: null };
}

function isLoserType(t) { return /败者|loser|losers/i.test(t); }
function isFinalType(t) { return /总决赛|final|决赛(?!半)/i.test(t); }
function isSemiType(t) { return /半决赛|semi/i.test(t); }

function propagate() {
    const matches = getMatches();
    matches.forEach(m => { m.winner = null; m.loser = null; m.isCompleted = false;
        if (m.teamA && m.teamB && m.scoreA !== m.scoreB) {
            if (m.scoreA > m.scoreB) { m.winner = m.teamA; m.loser = m.teamB; }
            else { m.winner = m.teamB; m.loser = m.teamA; }
            m.isCompleted = true;
        }
    });
    for (let iter = 0; iter < 20; iter++) {
        let changed = false;
        for (const m of matches) {
            if (m.winner && m.winNextId) {
                const next = matches.find(x => x.id === m.winNextId);
                if (next && fillSlot(next, m.winner)) changed = true;
            }
            if (m.loser && m.loseNextId) {
                const next = matches.find(x => x.id === m.loseNextId);
                if (next && fillSlot(next, m.loser)) changed = true;
            }
        }
        if (!changed) break;
    }
    setMatches(matches);
}
function fillSlot(match, team) {
    if (!match.teamA) { match.teamA = team; return true; }
    if (!match.teamB && match.teamA !== team) { match.teamB = team; return true; }
    return false;
}

// ===================== 布局算法 =====================
function computeDepth(matches) {
    matches.forEach(m => m.depth = null);
    const hasParent = new Set();
    matches.forEach(m => {
        if (m.winNextId) hasParent.add(m.winNextId);
        if (m.loseNextId) hasParent.add(m.loseNextId);
    });
    matches.forEach(m => { if (!hasParent.has(m.id)) m.depth = 0; });
    let changed = true;
    while (changed) {
        changed = false;
        matches.forEach(m => {
            if (m.depth !== null) return;
            const parents = matches.filter(p => p.winNextId === m.id || p.loseNextId === m.id);
            const ready = parents.filter(p => p.depth !== null);
            if (ready.length === parents.length && parents.length > 0) {
                m.depth = Math.max(...ready.map(p => p.depth)) + 1;
                changed = true;
            }
        });
    }
    matches.forEach(m => { if (m.depth === null) m.depth = 0; });

    // 按 roundName 统一 depth：同名轮次取最大 depth，确保视觉对齐
    const roundGroups = {};
    matches.forEach(m => {
        const rn = m.roundName || '';
        if (!roundGroups[rn]) roundGroups[rn] = [];
        roundGroups[rn].push(m);
    });
    Object.values(roundGroups).forEach(group => {
        const maxD = Math.max(...group.map(m => m.depth));
        group.forEach(m => { m.depth = maxD; });
    });
}

function computeRows(matches) {
    const BASE_Y = 10;           // 对阵图起始 Y 坐标
    const MATCH_GAP = 140;       // 同轮比赛之间的垂直间距
    const LOSER_STEP = 30;       // 败者组每轮向上的阶梯步长
    const CARD_HEIGHT = 100;     // 卡片高度 + 余量
    const MIN_GAP = 40;          // 同一列不同组最小间距

    // 分类：胜者组、败者组、总决赛
    const winners = matches.filter(m => !isLoserType(m.type) && !isFinalType(m.type));
    const losers = matches.filter(m => isLoserType(m.type));
    const finals = matches.filter(m => isFinalType(m.type));

    // 辅助：按晋级关系（winNextId）将比赛分层
    function groupRounds(items, nextField) {
        if (items.length === 0) return [];
        const pointed = new Set();
        items.forEach(m => {
            if (m[nextField]) {
                const next = items.find(x => x.id === m[nextField]);
                if (next) pointed.add(next.id);
            }
        });
        const rounds = [];
        let current = items.filter(m => !pointed.has(m.id));
        while (current.length > 0) {
            rounds.push([...current]);
            const nextIds = new Set();
            current.forEach(m => {
                if (m[nextField]) {
                    const next = items.find(x => x.id === m[nextField]);
                    if (next) {
                        let alreadyIn = false;
                        for (const r of rounds) {
                            if (r.includes(next)) { alreadyIn = true; break; }
                        }
                        if (!alreadyIn) nextIds.add(next.id);
                    }
                }
            });
            current = items.filter(m => nextIds.has(m.id));
        }
        return rounds;
    }

    // ========== 胜者组：横向金字塔进阶 ==========
    const wRounds = groupRounds(winners, 'winNextId');
    if (wRounds.length > 0) {
        wRounds[0].sort((a, b) => a.id - b.id);
        wRounds[0].forEach((m, i) => { m.gridRow = BASE_Y + i * MATCH_GAP; });
    }
    for (let r = 1; r < wRounds.length; r++) {
        const round = wRounds[r];
        for (const m of round) {
            const children = wRounds[r - 1].filter(child => child.winNextId === m.id);
            if (children.length > 0) {
                let avgY = children.reduce((sum, c) => sum + c.gridRow, 0) / children.length;
                if (r === wRounds.length - 1 && wRounds.length >= 2) avgY += LOSER_STEP;
                m.gridRow = Math.round(avgY);
            }
        }
    }

    // ========== 败者组：阶梯上的进阶 ==========
    const winnerMaxY = (wRounds.length > 0 && wRounds[0].length > 0)
        ? BASE_Y + (wRounds[0].length - 1) * MATCH_GAP
        : BASE_Y;
    const loserBaseY = winnerMaxY + MATCH_GAP;

    const lRounds = groupRounds(losers, 'winNextId');
    for (let r = 0; r < lRounds.length; r++) {
        const round = lRounds[r];
        round.sort((a, b) => a.id - b.id);
        const roundOffset = r * LOSER_STEP;
        round.forEach((m, i) => {
            m.gridRow = loserBaseY - roundOffset + i * MATCH_GAP;
        });
    }

    // ========== 总决赛：最高和最低中间 ==========
    if (finals.length > 0) {
        const allYs = matches.filter(m => !isFinalType(m.type) && m.gridRow !== undefined).map(m => m.gridRow);
        if (allYs.length > 0) {
            const minY = Math.min(...allYs);
            const maxY = Math.max(...allYs);
            finals.forEach(m => { m.gridRow = Math.round((minY + maxY) / 2); });
        } else {
            finals.forEach(m => { m.gridRow = BASE_Y; });
        }
    }

    // ========== 防重叠：同一 depth 的败者组整体下移 ==========
    const depthGroups = {};
    matches.forEach(m => {
        if (m.gridRow === undefined) return;
        const d = m.depth || 0;
        if (!depthGroups[d]) depthGroups[d] = [];
        depthGroups[d].push(m);
    });

    Object.values(depthGroups).forEach(group => {
        const winGroup = group.filter(m => !isLoserType(m.type) && !isFinalType(m.type));
        const loseGroup = group.filter(m => isLoserType(m.type));
        if (winGroup.length === 0 || loseGroup.length === 0) return;

        const winBottom = Math.max(...winGroup.map(m => m.gridRow)) + CARD_HEIGHT;
        const loseTop = Math.min(...loseGroup.map(m => m.gridRow));

        if (loseTop < winBottom + MIN_GAP) {
            const offset = winBottom + MIN_GAP - loseTop;
            // 下移该 depth 的所有败者组
            loseGroup.forEach(m => { m.gridRow += offset; });
            // 向上下游传播偏移，保持败者组从左下到右上的阶梯不被破坏
            const shiftedIds = new Set(loseGroup.map(m => m.id));
            let changed = true;
            while (changed) {
                changed = false;
                // 向下游传播（子节点）
                for (const m of matches) {
                    if (!isLoserType(m.type)) continue;
                    if (shiftedIds.has(m.id)) continue;
                    if (m.gridRow === undefined) continue;
                    const parents = matches.filter(p =>
                        (p.winNextId === m.id || p.loseNextId === m.id) && shiftedIds.has(p.id)
                    );
                    if (parents.length > 0) {
                        m.gridRow += offset;
                        shiftedIds.add(m.id);
                        changed = true;
                    }
                }
                // 向上游传播（父节点）——败者组被挤下时，左边轮次同步下移保持阶梯
                for (const m of matches) {
                    if (!isLoserType(m.type)) continue;
                    if (shiftedIds.has(m.id)) continue;
                    if (m.gridRow === undefined) continue;
                    // m 指向的下游比赛若已被 shifted，则 m 同步下移以保持阶梯
                    const children = matches.filter(p =>
                        shiftedIds.has(p.id) && (m.winNextId === p.id || m.loseNextId === p.id)
                    );
                    if (children.length > 0) {
                        m.gridRow += offset;
                        shiftedIds.add(m.id);
                        changed = true;
                    }
                }
            }
        }
    });
}
function getColName(matches, depth) {
    const colMatches = matches.filter(m => m.depth === depth);
    const finals = colMatches.find(m => isFinalType(m.type));
    if (finals) return '总决赛';
    const semi = colMatches.find(m => isSemiType(m.type));
    if (semi) return '半决赛';
    const upper = colMatches.filter(m => !isLoserType(m.type) && !isFinalType(m.type));
    const lower = colMatches.filter(m => isLoserType(m.type));
    if (upper.length > 0) return upper[0].roundName;
    if (lower.length > 0) return lower[0].roundName;
    return '';
}
function displayId(match) {
    if (isFinalType(match.type)) return 'FINALS';
    return 'GAME' + match.id;
}
function displayRefId(id, matches) {
    const m = matches.find(x => x.id === id);
    if (!m) return 'GAME' + id;
    if (isFinalType(m.type)) return 'FINALS';
    return 'GAME' + id;
}
function tagClass(match) {
    if (isLoserType(match.type)) return 'l-tag';
    if (isFinalType(match.type)) return 'f-tag';
    return 'w-tag';
}
function safeTypeClass(type) {
    return type.replace(/[^a-zA-Z0-9一-龥]/g, '');
}

// ===================== 渲染对阵图 =====================
function renderBracket() {
    propagate();
    const matches = getMatches();
    const canvas = document.getElementById('canvas');
    const scrollArea = document.getElementById('bracketScrollArea');

    if (matches.length === 0) {
        document.getElementById('gridHeader').innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:40px;">暂无比赛数据</div>';
        const emptyBody = document.getElementById('gridBody');
        emptyBody.innerHTML = '';
        const emptySvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        emptySvg.setAttribute('class', 'svg-layer');
        emptySvg.setAttribute('id', 'svgLayer');
        const emptyDefs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
        const gWin = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
        gWin.setAttribute('id', 'gradWin');
        const sW1 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
        sW1.setAttribute('offset', '0%'); sW1.setAttribute('stop-color', '#38bdf8'); sW1.setAttribute('stop-opacity', '0.3');
        const sW2 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
        sW2.setAttribute('offset', '100%'); sW2.setAttribute('stop-color', '#38bdf8'); sW2.setAttribute('stop-opacity', '0.8');
        gWin.appendChild(sW1); gWin.appendChild(sW2);
        const gLose = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
        gLose.setAttribute('id', 'gradLose');
        const sL1 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
        sL1.setAttribute('offset', '0%'); sL1.setAttribute('stop-color', '#f87171'); sL1.setAttribute('stop-opacity', '0.3');
        const sL2 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
        sL2.setAttribute('offset', '100%'); sL2.setAttribute('stop-color', '#f87171'); sL2.setAttribute('stop-opacity', '0.8');
        gLose.appendChild(sL1); gLose.appendChild(sL2);
        emptyDefs.appendChild(gWin); emptyDefs.appendChild(gLose);
        emptySvg.appendChild(emptyDefs);
        emptyBody.appendChild(emptySvg);
        if (canvas) { canvas.style.width = ''; canvas.style.height = ''; }
        return;
    }

    computeDepth(matches);
    computeRows(matches);

    const maxDepth = Math.max(...matches.map(m => m.depth));
    const maxRow = Math.max(...matches.map(m => m.gridRow || 0));
    const totalWidth = ((maxDepth + 1) * COL_W) + 'px';

    // 渲染固定头部
    const headerEl = document.getElementById('gridHeader');
    headerEl.innerHTML = '';
    for (let d = 0; d <= maxDepth; d++) {
        const div = document.createElement('div');
        div.className = 'col-header';
        div.textContent = getColName(matches, d);
        headerEl.appendChild(div);
    }
    headerEl.style.width = totalWidth;
    headerEl.style.zoom = zoomScale;

    // 渲染滚动内容
    const bodyEl = document.getElementById('gridBody');
    const cards = bodyEl.querySelectorAll('.match-card');
    cards.forEach(c => c.remove());
    const svgEl = document.getElementById('svgLayer');
    if (!svgEl) {
        const newSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        newSvg.setAttribute('class', 'svg-layer');
        newSvg.setAttribute('id', 'svgLayer');
        bodyEl.insertBefore(newSvg, bodyEl.firstChild);
    }
    bodyEl.style.height = (maxRow + GAP + 100) + 'px';
    bodyEl.style.width = totalWidth;

    if (canvas) {
        const maxCardRight = Math.max(...matches.map(m => (m.depth || 0) * COL_W + 15 + 250));
        const maxCardBottom = Math.max(...matches.map(m => (m.gridRow || 0) + 100));
        const canvasWidth = Math.max(maxCardRight + 30, (scrollArea ? scrollArea.clientWidth * 1.5 : 0));
        const canvasHeight = Math.max(maxCardBottom + 30, (scrollArea ? scrollArea.clientHeight * 3 : 0));
        canvas.style.width = canvasWidth + 'px';
        canvas.style.height = canvasHeight + 'px';
    }

    matches.forEach(m => {
        if (m.depth === undefined || m.gridRow === undefined) return;
        const card = createCard(m, matches);
        card.style.left = (m.depth * COL_W + 45) + 'px';
        card.style.top = m.gridRow + 'px';
        bodyEl.appendChild(card);
    });

    requestAnimationFrame(() => drawConnections(matches));
}

function renderTeamAvatar(teamName, isWinner, isLoser) {

    }

function createCard(match, allMatches) {
    const isFinal = isFinalType(match.type);
    const card = document.createElement('div');
    card.className = `match-card type-${safeTypeClass(match.type)} ${isFinal ? 'is-final' : ''}`;
    card.dataset.id = match.id;
    if (!IS_EXPORT_MODE) {
        card.onclick = () => openMatchModal(match.id);
    }

    const teamA = match.teamA || '待定';
    const teamB = match.teamB || '待定';
    const done = match.isCompleted;

    const clsA = match.winner === match.teamA ? 'win' : (match.loser === match.teamA ? 'lose' : 'pending');
    const clsB = match.winner === match.teamB ? 'win' : (match.loser === match.teamB ? 'lose' : 'pending');

    const status = done ? '<span class="match-status done">已结束</span>' :
                   (match.teamA && match.teamB ? '<span class="match-status wait">未开始</span>' :
                   '<span class="match-status unk">待定</span>');

    let scoreHtml;
    if (done) {
        const aWin = match.scoreA > match.scoreB;
        const bWin = match.scoreB > match.scoreA;
        scoreHtml = `<div class="score-center done">
            <span class="${aWin ? 'score-win' : 'score-lose'}">${match.scoreA}</span>
            <span class="score-sep">-</span>
            <span class="${bWin ? 'score-win' : 'score-lose'}">${match.scoreB}</span>
        </div>`;
    } else {
        scoreHtml = `<div class="score-center vs">VS</div>`;
    }

    const winRef = match.winNextId ? displayRefId(match.winNextId, allMatches) : '';
    const loseRef = match.loseNextId ? displayRefId(match.loseNextId, allMatches) : '';

    const crownHtml = isFinal ? '<div class="finals-crown"><i class="fas fa-crown"></i></div>' : '';

    card.innerHTML = `
        ${crownHtml}
        <div class="match-card-header">
            <div class="match-meta">
                <span class="match-id-tag ${tagClass(match)}">${displayId(match)}</span>
                <span class="match-round-tag">${match.roundName}</span>
            </div>
            ${status}
        </div>
        <div class="match-body">
            <div class="team-side">
                ${renderTeamAvatar(match.teamA, match.winner === match.teamA, match.loser === match.teamA)}
                <span class="team-name ${clsA}">${teamA}</span>
            </div>
            ${scoreHtml}
            <div class="team-side right">
                <span class="team-name ${clsB}">${teamB}</span>
                ${renderTeamAvatar(match.teamB, match.winner === match.teamB, match.loser === match.teamB)}
            </div>
        </div>
        <div class="match-footer">
            <div class="match-time">
                <i class="far fa-calendar-alt"></i>
                <span>${match.date || '日期待定'} ${match.time || ''}</span>
            </div>
            <div class="match-links">
                ${winRef ? `<span class="match-link win-link" title="胜者晋级"><i class="fas fa-arrow-up"></i>${winRef}</span>` : ''}
                ${loseRef ? `<span class="match-link lose-link" title="败者落位"><i class="fas fa-arrow-down"></i>${loseRef}</span>` : ''}
            </div>
        </div>`;
    return card;
}

// ===================== 连线绘制 =====================
function drawConnections(matches) {
    const svg = document.getElementById('svgLayer');
    if (!svg) return;

    // 获取所有卡片的实际边界，计算 SVG 所需尺寸
    const cards = document.querySelectorAll('.match-card');
    let maxRight = 0, maxBottom = 0;
    cards.forEach(card => {
        const rect = card.getBoundingClientRect();
        const gridBody = document.getElementById('gridBody');
        if (gridBody) {
            const gridRect = gridBody.getBoundingClientRect();
            const right = (rect.left - gridRect.left) + rect.width + 100; // +100 余量
            const bottom = (rect.top - gridRect.top) + rect.height + 100;
            maxRight = Math.max(maxRight, right);
            maxBottom = Math.max(maxBottom, bottom);
        }
    });

    // 如果没有卡片，使用数据模型作为后备
    if (maxRight === 0) {
        const maxDepth = Math.max(...matches.map(m => m.depth || 0), 0);
        const maxRow = Math.max(...matches.map(m => m.gridRow || 0), 0);
        maxRight = (maxDepth + 1) * COL_W;
        maxBottom = maxRow + GAP + 100;
    }

    svg.setAttribute('width', maxRight);
    svg.setAttribute('height', maxBottom);
    svg.style.width = maxRight + 'px';
    svg.style.height = maxBottom + 'px';

    // 清空现有路径，保留 defs
    let defs = svg.querySelector('defs');
    while (svg.firstChild) { svg.removeChild(svg.firstChild); }
    if (!defs) {
        defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
        const gradWin = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
        gradWin.setAttribute('id', 'gradWin');
        gradWin.setAttribute('x1', '0%'); gradWin.setAttribute('y1', '0%');
        gradWin.setAttribute('x2', '100%'); gradWin.setAttribute('y2', '0%');
        const stopW1 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
        stopW1.setAttribute('offset', '0%'); stopW1.setAttribute('stop-color', '#38bdf8'); stopW1.setAttribute('stop-opacity', '0.3');
        const stopW2 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
        stopW2.setAttribute('offset', '100%'); stopW2.setAttribute('stop-color', '#38bdf8'); stopW2.setAttribute('stop-opacity', '0.8');
        gradWin.appendChild(stopW1); gradWin.appendChild(stopW2);
        const gradLose = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
        gradLose.setAttribute('id', 'gradLose');
        gradLose.setAttribute('x1', '0%'); gradLose.setAttribute('y1', '0%');
        gradLose.setAttribute('x2', '100%'); gradLose.setAttribute('y2', '0%');
        const stopL1 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
        stopL1.setAttribute('offset', '0%'); stopL1.setAttribute('stop-color', '#f87171'); stopL1.setAttribute('stop-opacity', '0.3');
        const stopL2 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
        stopL2.setAttribute('offset', '100%'); stopL2.setAttribute('stop-color', '#f87171'); stopL2.setAttribute('stop-opacity', '0.8');
        gradLose.appendChild(stopL1); gradLose.appendChild(stopL2);
        defs.appendChild(gradWin); defs.appendChild(gradLose);
    }
    svg.appendChild(defs);

    matches.forEach(m => {
        if (m.winNextId) drawLine(svg, m, m.winNextId, 'win-path', matches);
        if (m.loseNextId) drawLine(svg, m, m.loseNextId, 'lose-path', matches);
    });
}
function drawLine(svg, fromMatch, toId, className, allMatches) {
    const toMatch = allMatches.find(m => m.id === toId);
    if (!toMatch) return;

    // 通过 DOM 查询获取卡片的实际位置
    const fromCard = document.querySelector(`.match-card[data-id="${fromMatch.id}"]`);
    const toCard = document.querySelector(`.match-card[data-id="${toMatch.id}"]`);
    if (!fromCard || !toCard) return;

    // 获取相对于 gridBody 的位置
    const gridBody = document.getElementById('gridBody');
    if (!gridBody) return;
    const gridRect = gridBody.getBoundingClientRect();
    const fromRect = fromCard.getBoundingClientRect();
    const toRect = toCard.getBoundingClientRect();

    // 计算相对于 gridBody 的坐标
    const x1 = (fromRect.left - gridRect.left) + fromRect.width;
    const y1 = (fromRect.top - gridRect.top) + fromRect.height / 2;
    const x2 = (toRect.left - gridRect.left);
    const y2 = (toRect.top - gridRect.top) + toRect.height / 2;

    const gap = x2 - x1;
    const extend = Math.max(gap * 0.5, 40);
    const cp1x = x1 + extend;
    const cp2x = x2 - extend;

    const dy = y2 - y1;
    let cp1y = y1 + dy * 0.3;
    let cp2y = y2 - dy * 0.3;

    if (Math.abs(dy) < 1) {
        const offset = Math.min(gap * 0.15, 25);
        cp1y = y1 + offset;
        cp2y = y2 - offset;
    }

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M ${x1} ${y1} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${x2} ${y2}`);
    path.setAttribute('class', className);
    svg.appendChild(path);
}

function teamChip(name) {
    if (!name) return '<span style="color:var(--text-muted)">待定</span>';
    const t = getTeam(name);
    const style = t.color ? `background:${t.color}20;color:${t.color};border-color:${t.color}30;` : '';
    const avatar = t.icon ? `<img src="${t.icon}" style="width:100%;height:100%;object-fit:cover;">` : (t.short || name.charAt(0));
    return `<span class="team-chip"><span class="mini-avatar" style="${style}">${avatar}</span>${name}</span>`;
}
function updateField(id, field, value) {
    const matches = getMatches();
    const m = matches.find(x => x.id === id);
    if (!m) return;
    m[field] = value;
    setMatches(matches);
    if (currentView === 'bracket') renderBracket();
}
function updateScore(id, val) {
    const parts = val.split(':');
    const matches = getMatches();
    const m = matches.find(x => x.id === id);
    if (m) {
        m.scoreA = parseInt(parts[0]) || 0;
        m.scoreB = parseInt(parts[1]) || 0;
        setMatches(matches);
        if (currentView === 'bracket') renderBracket();
    }
}
function deleteMatch(id) {
    if (!confirm('确定删除这场比赛？')) return;
    let matches = getMatches();
    const idx = matches.findIndex(m => m.id === id);
    if (idx === -1) return;
    matches.splice(idx, 1);
    matches.forEach(m => {
        if (m.id > id) m.id -= 1;
        if (m.winNextId === id) m.winNextId = null;
        else if (m.winNextId && m.winNextId > id) m.winNextId -= 1;
        if (m.loseNextId === id) m.loseNextId = null;
        else if (m.loseNextId && m.loseNextId > id) m.loseNextId -= 1;
    });
    setMatches(matches);
    renderAdmin();
    if (currentView === 'bracket') renderBracket();
}

        const card = document.createElement('div');
        card.className = 'team-card';
        const avatar = t.icon ? `<img src="${t.icon}" alt="">` : (t.short || key.charAt(0));
        const bg = t.color ? `background:${t.color}20;border-color:${t.color}35;color:${t.color};` : '';
        card.innerHTML = `
            <div class="t-avatar" style="${bg}">${avatar}</div>
            <div class="t-info">
                <div class="t-name">${t.name || key}</div>
                <div class="t-short">${key} · ${t.short || '-'}</div>
            </div>
            <div class="t-color" style="background:${t.color || 'var(--text-muted)'}"></div>
            <div class="t-actions">
                <button onclick="openTeamModal('${key.replace(/'/g,"\'")}')" title="编辑"><i class="fas fa-pen"></i></button>
                <button onclick="deleteTeam('${key.replace(/'/g,"\'")}')" title="删除"><i class="fas fa-trash"></i></button>
            </div>
        `;
        grid.appendChild(card);
    });
    updateTeamDatalist();
}
function updateTeamDatalist() {
    const dl = document.getElementById('teamList');
    if (!dl) return;
    dl.innerHTML = '';
    Object.keys(appData.teams || {}).forEach(k => {
        const opt = document.createElement('option'); opt.value = k; dl.appendChild(opt);
    });
}
function openTeamModal(key = null) {
    const overlay = document.getElementById('teamModalOverlay');
    const title = document.getElementById('teamModalTitle');
    if (!overlay || !title) return;
    document.getElementById('editTeamKey').value = key || '';
    if (key && appData.teams[key]) {
        const t = appData.teams[key];
        title.textContent = '编辑战队';
        document.getElementById('tKey').value = key;
        document.getElementById('tName').value = t.name || '';
        document.getElementById('tShort').value = t.short || '';
        document.getElementById('tIcon').value = t.icon || '';
        document.getElementById('tColor').value = t.color || '#6366f1';
    } else {
        title.textContent = '添加战队';
        document.getElementById('tKey').value = '';
        document.getElementById('tName').value = '';
        document.getElementById('tShort').value = '';
        document.getElementById('tIcon').value = '';
        document.getElementById('tColor').value = '#6366f1';
    }
    overlay.classList.add('show');
}
function closeTeamModal() {
    const el = document.getElementById('teamModalOverlay');
    if (el) el.classList.remove('show');
}
function saveTeam() {
    const editKey = document.getElementById('editTeamKey').value;
    const key = document.getElementById('tKey').value.trim();
    if (!key) { alert('请输入战队标识名'); return; }
    const team = {
        name: document.getElementById('tName').value.trim() || key,
        short: document.getElementById('tShort').value.trim() || key.charAt(0),
        icon: document.getElementById('tIcon').value.trim(),
        color: document.getElementById('tColor').value
    };
    if (editKey && editKey !== key) { delete appData.teams[editKey]; }
    appData.teams[key] = team;
    saveData(); closeTeamModal(); renderTeams();
    if (currentView === 'bracket') renderBracket();
    else if (currentView === 'admin') renderAdmin();
}
function deleteTeam(key) {
    if (!confirm(`删除战队 "${key}"？`)) return;
    delete appData.teams[key];
    saveData(); renderTeams();
    if (currentView === 'bracket') renderBracket();
    else if (currentView === 'admin') renderAdmin();
}

// ===================== 比赛模态框 =====================
function openMatchModal(id = null) {
    updateTypeList(); updateTeamDatalist();
    const overlay = document.getElementById('matchModalOverlay');
    const title = document.getElementById('matchModalTitle');
    const editId = document.getElementById('editMatchId');
    if (!overlay || !title) return;

    if (id) {
        const m = getMatches().find(x => x.id === id);
        if (!m) return;
        title.textContent = '编辑比赛 ' + displayId(m);
        editId.value = id;
        document.getElementById('mType').value = m.type;
        document.getElementById('mRound').value = m.roundName || '';
        document.getElementById('mTeamA').value = m.teamA || '';
        document.getElementById('mTeamB').value = m.teamB || '';
        document.getElementById('mScoreA').value = m.scoreA;
        document.getElementById('mScoreB').value = m.scoreB;
        document.getElementById('mDate').value = m.date || '';
        document.getElementById('mTime').value = m.time || '';
        document.getElementById('mWinNext').value = m.winNextId || '';
        document.getElementById('mLoseNext').value = m.loseNextId || '';
    } else {
        title.textContent = '添加比赛';
        editId.value = '';
        document.getElementById('mType').value = '胜者组';
        ['mRound','mTeamA','mTeamB','mDate','mTime','mWinNext','mLoseNext'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.value = '';
        });
        document.getElementById('mScoreA').value = 0;
        document.getElementById('mScoreB').value = 0;
    }
    overlay.classList.add('show');
}
function closeMatchModal() {
    const el = document.getElementById('matchModalOverlay');
    if (el) el.classList.remove('show');
}
function saveMatch() {
    const editId = document.getElementById('editMatchId').value;
    const matches = getMatches();
    const newMatch = {
        id: editId ? parseInt(editId) : getNextId(),
        type: document.getElementById('mType').value || '未分类',
        roundName: document.getElementById('mRound').value || '未命名',
        teamA: document.getElementById('mTeamA').value || null,
        teamB: document.getElementById('mTeamB').value || null,
        scoreA: parseInt(document.getElementById('mScoreA').value) || 0,
        scoreB: parseInt(document.getElementById('mScoreB').value) || 0,
        date: document.getElementById('mDate').value || '',
        time: document.getElementById('mTime').value || '',
        winNextId: document.getElementById('mWinNext').value ? parseInt(document.getElementById('mWinNext').value) : null,
        loseNextId: document.getElementById('mLoseNext').value ? parseInt(document.getElementById('mLoseNext').value) : null
    };
    if (editId) {
        const idx = matches.findIndex(m => m.id == editId);
        if (idx !== -1) matches[idx] = newMatch;
        else matches.push(newMatch);
    } else {
        matches.push(newMatch);
    }
    setMatches(matches);
    closeMatchModal();
    if (currentView === 'bracket') renderBracket();
    else if (currentView === 'admin') renderAdmin();
}
function updateTypeList() {
    const matches = getMatches();
    const types = [...new Set(matches.map(m => m.type))];
    const datalist = document.getElementById('typeList');
    if (!datalist) return;
    datalist.innerHTML = '';
    const defaults = ['胜者组', '败者组', '半决赛', '总决赛'];
    [...defaults, ...types.filter(t => !defaults.includes(t))].forEach(t => {
        const opt = document.createElement('option'); opt.value = t; datalist.appendChild(opt);
    });
}

// ===================== 导入导出 JSON =====================
function exportData() {
    const blob = new Blob([JSON.stringify(appData, null, 2)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'bracket_backup.json';
    a.click();
    URL.revokeObjectURL(a.href);
}
function importData() {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = '.json';
    input.onchange = e => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = ev => {
            try {
                const parsed = JSON.parse(ev.target.result);
                if (parsed && typeof parsed === 'object' && parsed.tournaments) {
                    appData = parsed;
                } else if (parsed && typeof parsed === 'object') {
                    appData = { tournaments: parsed, teams: {}, settings: {} };
                } else {
                    throw new Error('Invalid format');
                }
                saveData();
                currentTournament = (appData.settings && appData.settings.currentTournament) || Object.keys(appData.tournaments)[0] || '';
                renderTournamentPanel();
                switchView(currentView || 'bracket');
                alert('导入成功');
            } catch (err) {
                alert('文件格式错误: ' + err.message);
            }
        };
        reader.readAsText(file);
    };
    input.click();
}

// ===================== Excel 导入导出 =====================
function exportExcel() {
    const matches = getMatches();
    const teams = appData.teams || {};

    // 赛程数据工作表
    const matchHeaders = ['ID', '类型', '轮次', '战队A', '战队B', '比分A', '比分B', '日期', '时间', '胜晋ID', '败落ID'];
    const matchData = matches.map(m => [
        m.id, m.type, m.roundName || '', m.teamA || '', m.teamB || '',
        m.scoreA, m.scoreB, m.date || '', m.time || '',
        m.winNextId || '', m.loseNextId || ''
    ]);
    const matchWs = XLSX.utils.aoa_to_sheet([matchHeaders, ...matchData]);

    // 设置列宽
    const matchWscols = [
        {wch: 6}, {wch: 12}, {wch: 16}, {wch: 14}, {wch: 14},
        {wch: 6}, {wch: 6}, {wch: 12}, {wch: 8}, {wch: 8}, {wch: 8}
    ];
    matchWs['!cols'] = matchWscols;

    // 战队库工作表
    const teamHeaders = ['标识名', '显示名称', '缩写', '图标URL', '主题色'];
    const teamData = Object.entries(teams).map(([k, t]) => [
        k, t.name || '', t.short || '', t.icon || '', t.color || ''
    ]);
    const teamWs = XLSX.utils.aoa_to_sheet([teamHeaders, ...teamData]);
    teamWs['!cols'] = [{wch: 12}, {wch: 20}, {wch: 8}, {wch: 50}, {wch: 10}];

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, matchWs, '赛程数据');
    XLSX.utils.book_append_sheet(wb, teamWs, '战队库');

    const tournamentName = currentTournament || '赛事';
    XLSX.writeFile(wb, `${tournamentName}_赛程数据.xlsx`);
}

function importExcel() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.xlsx,.xls,.csv';
    input.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            try {
                const data = new Uint8Array(ev.target.result);
                const workbook = XLSX.read(data, { type: 'array' });

                // 解析赛程数据
                const matchSheet = workbook.Sheets['赛程数据'] || workbook.Sheets[workbook.SheetNames[0]];
                const matchJson = XLSX.utils.sheet_to_json(matchSheet, { header: 1 });

                if (matchJson.length > 1) {
                    const headers = matchJson[0];
                    const fieldMap = {};
                    headers.forEach((h, i) => {
                        const lower = String(h).trim().toLowerCase();
                        if (/id|编号|序号/.test(lower)) fieldMap.id = i;
                        else if (/类型|type|分组/.test(lower)) fieldMap.type = i;
                        else if (/轮次|round|阶段/.test(lower)) fieldMap.roundName = i;
                        else if (/战队a|队伍a|teama|team_a|a队/.test(lower)) fieldMap.teamA = i;
                        else if (/战队b|队伍b|teamb|team_b|b队/.test(lower)) fieldMap.teamB = i;
                        else if (/比分a|scorea|score_a|a分/.test(lower)) fieldMap.scoreA = i;
                        else if (/比分b|scoreb|score_b|b分/.test(lower)) fieldMap.scoreB = i;
                        else if (/日期|date|时间/.test(lower)) fieldMap.date = i;
                        else if (/时间|time/.test(lower) && !fieldMap.date) fieldMap.time = i;
                        else if (/胜晋|晋级|winnext|win_next|胜者/.test(lower)) fieldMap.winNextId = i;
                        else if (/败落|淘汰|losenext|lose_next|败者/.test(lower)) fieldMap.loseNextId = i;
                    });

                    const newMatches = [];
                    for (let i = 1; i < matchJson.length; i++) {
                        const row = matchJson[i];
                        if (!row || row.length === 0) continue;
                        const getVal = (field) => {
                            const idx = fieldMap[field];
                            if (idx === undefined) return undefined;
                            const val = row[idx];
                            if (val === undefined || val === null || val === '') return null;
                            return val;
                        };

                        const id = parseInt(getVal('id'));
                        if (!id || isNaN(id)) continue;

                        newMatches.push({
                            id: id,
                            type: getVal('type') || '未分类',
                            roundName: getVal('roundName') || '',
                            teamA: getVal('teamA') || null,
                            teamB: getVal('teamB') || null,
                            scoreA: parseInt(getVal('scoreA')) || 0,
                            scoreB: parseInt(getVal('scoreB')) || 0,
                            date: getVal('date') || '',
                            time: getVal('time') || '',
                            winNextId: getVal('winNextId') ? parseInt(getVal('winNextId')) : null,
                            loseNextId: getVal('loseNextId') ? parseInt(getVal('loseNextId')) : null
                        });
                    }

                    if (newMatches.length > 0) {
                        appData.tournaments[currentTournament] = newMatches;
                    }
                }

                // 解析战队库（如果有）
                const teamSheet = workbook.Sheets['战队库'];
                if (teamSheet) {
                    const teamJson = XLSX.utils.sheet_to_json(teamSheet, { header: 1 });
                    if (teamJson.length > 1) {
                        const tHeaders = teamJson[0];
                        const tMap = {};
                        tHeaders.forEach((h, i) => {
                            const lower = String(h).trim().toLowerCase();
                            if (/标识|key|id|名称/.test(lower)) tMap.key = i;
                            else if (/显示|name|全称/.test(lower)) tMap.name = i;
                            else if (/缩写|short|简称/.test(lower)) tMap.short = i;
                            else if (/图标|icon|url|头像/.test(lower)) tMap.icon = i;
                            else if (/颜色|color|主题/.test(lower)) tMap.color = i;
                        });

                        for (let i = 1; i < teamJson.length; i++) {
                            const row = teamJson[i];
                            if (!row || row.length === 0) continue;
                            const getVal = (field) => {
                                const idx = tMap[field];
                                if (idx === undefined) return undefined;
                                return row[idx] || '';
                            };
                            const key = getVal('key');
                            if (!key) continue;
                            appData.teams[key] = {
                                name: getVal('name') || key,
                                short: getVal('short') || key.charAt(0),
                                icon: getVal('icon') || '',
                                color: getVal('color') || '#6366f1'
                            };
                        }
                    }
                }

                saveData();
                renderTournamentPanel();
                if (currentView === 'bracket') renderBracket();
                else if (currentView === 'admin') renderAdmin();
                else if (currentView === 'teams') renderTeams();
                alert(`导入成功！共 ${getMatches().length} 场比赛`);
            } catch (err) {
                console.error(err);
                alert('Excel 解析失败: ' + err.message);
            }
        };
        reader.readAsArrayBuffer(file);
    };
    input.click();
}

// ===================== 动态背景初始化 =====================
function initEffects() {
    const container = document.getElementById('dynamicBg');
    if (!container) return;

    container.querySelectorAll('.lightning, .particle, .snowflake, .ember').forEach(el => el.remove());

    if (container.classList.contains('bg-storm')) {
        for (let i = 0; i < 5; i++) {
            const el = document.createElement('div');
            el.className = 'lightning';
            el.style.left = (15 + Math.random() * 70) + '%';
            el.style.top = (5 + Math.random() * 50) + '%';
            el.style.height = (80 + Math.random() * 100) + 'px';
            el.style.animationDelay = (Math.random() * 4) + 's';
            el.style.animationDuration = (3 + Math.random() * 3) + 's';
            container.appendChild(el);
        }
    } else if (container.classList.contains('bg-dark')) {
        for (let i = 0; i < 40; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.top = Math.random() * 100 + '%';
            p.style.animationDuration = (6 + Math.random() * 14) + 's';
            p.style.animationDelay = Math.random() * 10 + 's';
            p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
            p.style.opacity = Math.random() * 0.4 + 0.1;
            container.appendChild(p);
        }
    } else if (container.classList.contains('bg-frost')) {
        for (let i = 0; i < 25; i++) {
            const s = document.createElement('div');
            s.className = 'snowflake';
            s.innerHTML = '❄';
            s.style.left = Math.random() * 100 + '%';
            s.style.animationDuration = (4 + Math.random() * 12) + 's';
            s.style.animationDelay = Math.random() * 5 + 's';
            s.style.fontSize = (8 + Math.random() * 12) + 'px';
            container.appendChild(s);
        }
    } else if (container.classList.contains('bg-fire')) {
        for (let i = 0; i < 20; i++) {
            const e = document.createElement('div');
            e.className = 'ember';
            e.style.left = Math.random() * 100 + '%';
            e.style.animationDuration = (3 + Math.random() * 7) + 's';
            e.style.animationDelay = Math.random() * 5 + 's';
            e.style.width = e.style.height = (3 + Math.random() * 6) + 'px';
            container.appendChild(e);
        }
    }
}

function setBgTheme(themeClass) {
    const container = document.getElementById('dynamicBg');
    if (!container) return;
    container.className = 'dynamic-bg ' + themeClass;
    initEffects();
}

// ===================== 事件 =====================


document.addEventListener('DOMContentLoaded', function() {
    const scrollArea = document.getElementById('bracketScrollArea');
    const headerFixed = document.getElementById('bracketHeaderFixed');
    if (scrollArea && headerFixed) {
        scrollArea.addEventListener('scroll', () => {
            headerFixed.scrollLeft = scrollArea.scrollLeft;
        });
    }

    const scrollArea2 = document.getElementById('bracketScrollArea');
    if (scrollArea2) {
        // 双指/触控板缩放支持
        scrollArea2.addEventListener('wheel', e => {
            if (e.ctrlKey || e.metaKey) {
                e.preventDefault();
                zoom(e.deltaY > 0 ? -0.05 : 0.05);
            }
        }, {passive: false});

        // 移动端双指缩放
        let initialPinchDistance = 0;
        let initialZoomScale = 1;
        scrollArea2.addEventListener('touchstart', e => {
            if (e.touches.length === 2) {
                initialPinchDistance = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
                initialZoomScale = zoomScale;
            }
        }, {passive: true});

        scrollArea2.addEventListener('touchmove', e => {
            if (e.touches.length === 2) {
                e.preventDefault();
                const currentDistance = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
                const scale = (currentDistance / initialPinchDistance) * initialZoomScale;
                zoomTo(Math.max(0.3, Math.min(2, scale)));
            }
        }, {passive: false});
    }

    document.addEventListener('click', e => {
        const panel = document.getElementById('tournamentPanel');
        const trigger = document.getElementById('tournamentTrigger');
        if (panel && trigger && panel.classList.contains('open') && !panel.contains(e.target) && !trigger.contains(e.target)) {
            toggleTournamentPanel(false);
        }
        if (e.target.classList.contains('modal-overlay')) {
            e.target.classList.remove('show');
        }
    });

    loadData();
    initEffects();
    renderTournamentPanel();
    switchView('bracket');

    // 自动计算初始缩放比例
    autoFitZoom();
});

// 自动适配缩放
function autoFitZoom() {
    const viewport = document.getElementById('viewport');
    const canvas = document.getElementById('canvas');
    if (!viewport || !canvas) return;

    // 等待渲染完成
    setTimeout(() => {
        const viewportWidth = viewport.clientWidth - 40; // 减去 padding
        const canvasWidth = canvas.scrollWidth;
        if (canvasWidth > viewportWidth) {
            const fitScale = Math.max(0.3, (viewportWidth / canvasWidth) * 0.95);
            zoomTo(Math.round(fitScale * 100) / 100);
        }
    }, 100);
}

// 窗口大小变化时重新适配
let resizeTimer;
window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
        if (currentView === 'bracket') {
            autoFitZoom();
            const matches = getMatches();
            if (matches.length > 0) drawConnections(matches);
        }
    }, 200);
});
